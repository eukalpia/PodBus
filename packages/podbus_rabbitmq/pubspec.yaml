name: podbus_rabbitmq
description: RabbitMQ adapter for PodBus with publisher confirms, mandatory routing, retries, and dead-letter queues.
version: 0.1.0-beta.1
repository: https://github.com/eukalpia/PodBus
homepage: https://github.com/eukalpia/PodBus
documentation: https://github.com/eukalpia/PodBus/tree/main/docs
issue_tracker: https://github.com/eukalpia/PodBus/issues
topics:
  - rabbitmq
  - amqp
  - messaging
  - durable-jobs
  - backend

environment:
  sdk: ^3.12.0

resolution: workspace

dependencies:
  dart_amqp: ^0.3.1
  meta: ^1.17.0
  podbus_core: ^0.1.0-beta.1

dev_dependencies:
  lints: ^6.0.0
  test: ^1.26.0
