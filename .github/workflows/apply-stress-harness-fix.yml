name: Apply stress harness fix

on:
  pull_request:
    paths:
      - ".github/workflows/apply-stress-harness-fix.yml"
      - "tool/ci/apply_stress_harness_fix.py"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: apply-stress-harness-fix
  cancel-in-progress: false

jobs:
  patch-and-publish:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: beta-resilience-production-suite
          fetch-depth: 0
      - uses: dart-lang/setup-dart@65eb853c7ba17dde3be364c3d2858773e7144260
        with:
          sdk: 3.12.0
      - name: Apply and format end-to-end stress harness
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p test-results
          python3 tool/ci/apply_stress_harness_fix.py \
            > test-results/stress-patch.log 2>&1
          dart format tool/stress_transports.dart \
            >> test-results/stress-patch.log 2>&1
          git diff > test-results/stress-patch.diff
          cp .github/workflows/stress.yml test-results/stress.yml
          cat test-results/stress-patch.log
      - name: Publish generated Dart commit
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add tool/stress_transports.dart
          git commit -m "Make large stress tests end-to-end"
          git push --force origin HEAD:automation/stress-harness
      - name: Upload patch diagnostics
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: stress-harness-generated-commit
          path: test-results
          if-no-files-found: warn
          include-hidden-files: true
          retention-days: 7
