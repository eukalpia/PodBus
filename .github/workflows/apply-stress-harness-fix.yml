name: Apply stress harness fix

on:
  push:
    branches:
      - beta-resilience-production-suite
    paths:
      - ".github/workflows/apply-stress-harness-fix.yml"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: apply-stress-harness-fix
  cancel-in-progress: false

jobs:
  patch-and-commit:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: beta-resilience-production-suite
          fetch-depth: 0
      - uses: dart-lang/setup-dart@65eb853c7ba17dde3be364c3d2858773e7144260
        with:
          sdk: 3.12.0
      - name: Apply and format end-to-end stress harness
        run: |
          python3 tool/ci/apply_stress_harness_fix.py
          dart format tool/stress_transports.dart
      - name: Commit harness and remove temporary machinery
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git rm .github/workflows/apply-stress-harness-fix.yml
          git rm tool/ci/apply_stress_harness_fix.py
          git add tool/stress_transports.dart .github/workflows/stress.yml
          git commit -m "Make large stress tests end-to-end"
          git push origin HEAD:beta-resilience-production-suite
