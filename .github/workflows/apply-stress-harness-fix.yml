name: Apply stress harness fix

on:
  pull_request:
    paths:
      - ".github/workflows/apply-stress-harness-fix.yml"
      - "tool/ci/apply_stress_harness_fix.py"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: apply-stress-harness-fix
  cancel-in-progress: false

jobs:
  patch-and-export:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: beta-resilience-production-suite
          fetch-depth: 0
      - uses: dart-lang/setup-dart@65eb853c7ba17dde3be364c3d2858773e7144260
        with:
          sdk: 3.12.0
      - name: Apply, format, and export end-to-end stress harness
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p test-results/files/tool
          mkdir -p test-results/files/.github/workflows
          python3 tool/ci/apply_stress_harness_fix.py \
            > test-results/stress-patch.log 2>&1
          dart format tool/stress_transports.dart \
            >> test-results/stress-patch.log 2>&1
          git diff > test-results/stress-patch.diff
          cp tool/stress_transports.dart test-results/files/tool/stress_transports.dart
          cp .github/workflows/stress.yml \
            test-results/files/.github/workflows/stress.yml
          cat test-results/stress-patch.log
      - name: Upload complete patched files
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: stress-harness-patched-files
          path: test-results
          if-no-files-found: error
          retention-days: 7
