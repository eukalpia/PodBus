name: Apply recovery timeout fix

on:
  push:
    branches:
      - beta-resilience-production-suite
    paths:
      - ".github/workflows/apply-recovery-timeout-fix.yml"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: apply-recovery-timeout-fix
  cancel-in-progress: false

jobs:
  patch-and-validate:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: beta-resilience-production-suite
          fetch-depth: 0
      - uses: dart-lang/setup-dart@65eb853c7ba17dde3be364c3d2858773e7144260
        with:
          sdk: 3.12.0
      - name: Apply bounded recovery patch and regression tests
        shell: bash
        run: |
          python3 - <<'PY'
          from pathlib import Path
          import re

          source_path = Path('packages/podbus_core/lib/src/resilience.dart')
          source = source_path.read_text()

          source = source.replace(
              "    this.recoveryTimeout = const Duration(seconds: 30),\n"
              "    this.healthCheckInterval = const Duration(seconds: 5),",
              "    this.recoveryTimeout = const Duration(seconds: 30),\n"
              "    this.disposeTimeout = const Duration(seconds: 2),\n"
              "    this.healthCheckInterval = const Duration(seconds: 5),",
              1,
          )
          source = source.replace(
              "  final Duration recoveryTimeout;\n\n"
              "  /// Interval for proactive broker health probes.",
              "  final Duration recoveryTimeout;\n\n"
              "  /// Maximum time spent closing an unhealthy delegate during recovery.\n"
              "  final Duration disposeTimeout;\n\n"
              "  /// Interval for proactive broker health probes.",
              1,
          )
          source = source.replace(
              "  if (policy.recoveryTimeout <= Duration.zero ||\n"
              "      policy.healthCheckTimeout <= Duration.zero) {",
              "  if (policy.recoveryTimeout <= Duration.zero ||\n"
              "      policy.disposeTimeout <= Duration.zero ||\n"
              "      policy.healthCheckTimeout <= Duration.zero) {",
              1,
          )

          recovery_start = (
              "    final completer = Completer<void>();\n"
              "    final generation = _generation;\n"
              "    _recovery = completer.future;\n"
          )
          bus_guard = (
              "    final completer = Completer<void>();\n"
              "    final generation = _generation;\n"
              "    late final Future<void> guardedRecovery;\n"
              "    guardedRecovery = completer.future.timeout(\n"
              "      policy.recoveryTimeout,\n"
              "      onTimeout: () {\n"
              "        if (identical(_recovery, guardedRecovery)) {\n"
              "          _generation += 1;\n"
              "          _recovery = null;\n"
              "        }\n"
              "        final error = MessagingTimeoutException(\n"
              "          'Message bus recovery exceeded ${policy.recoveryTimeout}.',\n"
              "          timeout: policy.recoveryTimeout,\n"
              "        );\n"
              "        _lastRecoveryError = error;\n"
              "        throw error;\n"
              "      },\n"
              "    );\n"
              "    _recovery = guardedRecovery;\n"
          )
          queue_guard = bus_guard.replace(
              "Message bus recovery exceeded",
              "Durable job queue recovery exceeded",
          )
          if source.count(recovery_start) != 2:
              raise SystemExit('unexpected recovery block count')
          source = source.replace(recovery_start, bus_guard, 1)
          source = source.replace(recovery_start, queue_guard, 1)
          source = source.replace(
              "identical(_recovery, completer.future)",
              "identical(_recovery, guardedRecovery)",
          )
          source = source.replace(
              "return completer.future.timeout(policy.recoveryTimeout);",
              "return guardedRecovery;",
          )

          close_pattern = re.compile(
              r"(?P<indent>\s*)await (?P<name>candidate|replacement|delegate)\.close\("
              r"timeout: policy\.recoveryTimeout\);"
          )
          source, replacements = close_pattern.subn(
              lambda match: (
                  f"{match.group('indent')}await {match.group('name')}\n"
                  f"{match.group('indent')}    .close(timeout: policy.disposeTimeout)\n"
                  f"{match.group('indent')}    .timeout(policy.disposeTimeout);"
              ),
              source,
          )
          if replacements < 6:
              raise SystemExit(f'expected at least six recovery close replacements, got {replacements}')
          source_path.write_text(source)

          test_path = Path('packages/podbus_core/test/resilience_test.dart')
          tests = test_path.read_text()
          insertion = """
            test('bounds stalled delegate disposal during recovery', () async {
              final closeGate = Completer<void>();
              final delegates = <_FakeDurableQueue>[];
              final queue = ResilientDurableJobQueue(
                factory: () {
                  final delegate = _FakeDurableQueue(
                    closeGate: delegates.isEmpty ? closeGate.future : null,
                  );
                  delegates.add(delegate);
                  return delegate;
                },
                policy: const ReconnectPolicy(
                  maxAttempts: 3,
                  initialDelay: Duration.zero,
                  maxDelay: Duration.zero,
                  jitter: 0,
                  recoveryTimeout: Duration(seconds: 1),
                  disposeTimeout: Duration(milliseconds: 20),
                  healthCheckInterval: null,
                ),
              );

              await queue.connect();
              delegates.first.failNextEnqueue = true;
              await queue.enqueue('jobs.recovery', 1).timeout(
                const Duration(milliseconds: 500),
              );

              expect(delegates, hasLength(2));
              closeGate.complete();
              await queue.close();
            });

            test('clears a timed-out recovery before the next operation', () async {
              final connectGate = Completer<void>();
              final delegates = <_FakeDurableQueue>[];
              final queue = ResilientDurableJobQueue(
                factory: () {
                  final delegate = _FakeDurableQueue(
                    connectGate: delegates.length == 1 ? connectGate.future : null,
                  );
                  delegates.add(delegate);
                  return delegate;
                },
                policy: const ReconnectPolicy(
                  maxAttempts: 3,
                  initialDelay: Duration.zero,
                  maxDelay: Duration.zero,
                  jitter: 0,
                  recoveryTimeout: Duration(milliseconds: 40),
                  disposeTimeout: Duration(milliseconds: 10),
                  healthCheckInterval: null,
                ),
              );

              await queue.connect();
              delegates.first.failNextEnqueue = true;
              await expectLater(
                queue.enqueue('jobs.timeout', 1),
                throwsA(isA<MessagingTimeoutException>()),
              );

              connectGate.complete();
              await Future<void>.delayed(const Duration(milliseconds: 10));
              await queue.enqueue('jobs.timeout', 2);
              expect(delegates.length, greaterThanOrEqualTo(3));
              await queue.close();
            });

          """
          marker = "    test('close drains active proxy registrations and delegate', () async {"
          if marker not in tests:
              raise SystemExit('durable queue test insertion marker not found')
          tests = tests.replace(marker, insertion + marker, 1)

          tests = tests.replace(
              "  _FakeMessageBus({this.connectGate, this.connectError, this.subscribeError});",
              "  _FakeMessageBus({\n"
              "    this.connectGate,\n"
              "    this.closeGate,\n"
              "    this.connectError,\n"
              "    this.subscribeError,\n"
              "  });",
              1,
          )
          tests = tests.replace(
              "  final Future<void>? connectGate;\n"
              "  final Object? connectError;",
              "  final Future<void>? connectGate;\n"
              "  final Future<void>? closeGate;\n"
              "  final Object? connectError;",
              1,
          )
          tests = tests.replace(
              "  Future<void> close({Duration? timeout}) async {\n"
              "    closed = true;",
              "  Future<void> close({Duration? timeout}) async {\n"
              "    await closeGate;\n"
              "    closed = true;",
              1,
          )

          tests = tests.replace(
              "  _FakeDurableQueue({this.connectError});",
              "  _FakeDurableQueue({this.connectGate, this.closeGate, this.connectError});",
              1,
          )
          tests = tests.replace(
              "  final Object? connectError;\n"
              "  final List<_FakeWorker> workers = [];",
              "  final Future<void>? connectGate;\n"
              "  final Future<void>? closeGate;\n"
              "  final Object? connectError;\n"
              "  final List<_FakeWorker> workers = [];",
              1,
          )
          durable_connect = (
              "  Future<void> connect() async {\n"
              "    if (connectError case final error?) throw error;\n"
              "    connected = true;\n"
              "  }"
          )
          tests = tests.replace(
              durable_connect,
              "  Future<void> connect() async {\n"
              "    await connectGate;\n"
              "    if (connectError case final error?) throw error;\n"
              "    connected = true;\n"
              "  }",
              1,
          )
          durable_close = (
              "  Future<void> close({Duration? timeout}) async {\n"
              "    closed = true;\n"
              "    connected = false;\n"
              "    for (final worker in workers.toList()) {"
          )
          tests = tests.replace(
              durable_close,
              "  Future<void> close({Duration? timeout}) async {\n"
              "    await closeGate;\n"
              "    closed = true;\n"
              "    connected = false;\n"
              "    for (final worker in workers.toList()) {",
              1,
          )
          test_path.write_text(tests)
          PY
      - name: Resolve dependencies
        run: dart pub get
      - name: Format and analyze
        run: |
          dart format packages/podbus_core/lib/src/resilience.dart packages/podbus_core/test/resilience_test.dart
          dart analyze packages/podbus_core
      - name: Run resilience tests
        run: dart test packages/podbus_core/test/resilience_test.dart --reporter=expanded
      - name: Commit validated fix and remove one-shot workflow
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git rm .github/workflows/apply-recovery-timeout-fix.yml
          git add packages/podbus_core/lib/src/resilience.dart packages/podbus_core/test/resilience_test.dart
          git commit -m "Bound stalled reconnect cleanup"
          git push origin HEAD:beta-resilience-production-suite
