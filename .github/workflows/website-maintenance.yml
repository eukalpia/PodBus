name: Website maintenance

on:
  push:
    branches: [main]
    paths:
      - "website/**"
      - "assets/podbus.png"
      - ".github/workflows/website-maintenance.yml"

permissions:
  contents: write

concurrency:
  group: website-maintenance
  cancel-in-progress: true

env:
  NEXT_TELEMETRY_DISABLED: "1"

jobs:
  validate:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: main
          fetch-depth: 0

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: website/package-lock.json

      - name: Validate site
        id: validate
        continue-on-error: true
        shell: bash
        run: |
          set -o pipefail
          cd website
          npm ci --no-audit --no-fund 2>&1 | tee build-diagnostics.txt
          npm run typecheck 2>&1 | tee -a build-diagnostics.txt
          GITHUB_ACTIONS=true npm run build 2>&1 | tee -a build-diagnostics.txt
          test -s out/index.html
          test -s out/docs/index.html
          test -s out/docs/introduction/index.html
          test -s out/docs/api-reference/index.html

      - name: Commit validation result
        shell: bash
        env:
          VALIDATION_OUTCOME: ${{ steps.validate.outcome }}
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git rm .github/workflows/website-maintenance.yml
          if [ "$VALIDATION_OUTCOME" = success ]; then
            git rm -f website/build-diagnostics.txt || true
            git commit -m "Validate Next.js documentation export"
          else
            git add website/build-diagnostics.txt
            git commit -m "Update Next.js build diagnostics"
          fi
          git push origin HEAD:main
