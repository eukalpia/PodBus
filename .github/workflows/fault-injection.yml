name: Broker fault injection

on:
  pull_request:
  workflow_dispatch:
    inputs:
      profile:
        description: Fault-suite profile
        required: true
        default: smoke
        type: choice
        options:
          - smoke
          - full

permissions:
  contents: read

concurrency:
  group: fault-injection-${{ github.ref }}
  cancel-in-progress: true

env:
  DART_SDK: 3.12.0
  PROFILE: ${{ github.event_name == 'workflow_dispatch' && inputs.profile || 'smoke' }}

jobs:
  changes:
    name: Detect fault-suite changes
    runs-on: ubuntu-latest
    outputs:
      run: ${{ steps.detect.outputs.run }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
          fetch-depth: 2
      - id: detect
        shell: bash
        run: |
          set -euo pipefail
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "run=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          changed="$(git diff --name-only HEAD^ HEAD)"
          printf '%s\n' "$changed"
          if grep -Eq '^(packages/podbus_(core|nats|rabbitmq)/|tool/(fault_|src/fault_harness|ci/(start_integration_services|capture_rabbitmq_state|wait_for_rabbitmq)|qualification/beta-candidate)|docker-compose\.integration\.yaml$|\.github/workflows/fault-injection\.yml$)' <<< "$changed"; then
            echo "run=true" >> "$GITHUB_OUTPUT"
          else
            echo "run=false" >> "$GITHUB_OUTPUT"
          fi

  broker-faults:
    name: fault / ${{ matrix.scenario }}
    needs: changes
    if: needs.changes.outputs.run == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      max-parallel: 3
      matrix:
        scenario:
          - nats-tcp-partition
          - rabbitmq-tcp-partition
          - rabbitmq-channel-failures
          - nats-crash-before-ack
          - rabbitmq-crash-before-ack
          - multiple-replicas
          - nats-broker-stop-before-confirm
          - rabbitmq-broker-stop-before-confirm
          - nats-shutdown-during-dlq-ack
          - rabbitmq-shutdown-during-retry-confirm
          - rabbitmq-shutdown-during-dlq-confirm
          - slow-consumers
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - uses: dart-lang/setup-dart@65eb853c7ba17dde3be364c3d2858773e7144260
        with:
          sdk: ${{ env.DART_SDK }}
      - name: Resolve dependencies
        run: dart pub get
      - name: Start clean brokers and Toxiproxy
        run: bash tool/ci/start_integration_services.sh nats rabbitmq toxiproxy
      - name: Wait for services
        run: |
          bash tool/ci/wait_for_nats.sh
          bash tool/ci/wait_for_rabbitmq.sh
          bash tool/ci/wait_for_toxiproxy.sh
      - name: Run isolated broker fault scenario
        run: >-
          dart run tool/fault_suite.dart
          --profile=${PROFILE}
          --scenario=${{ matrix.scenario }}
          --report=test-results/fault-${{ matrix.scenario }}.json
      - name: Capture broker logs
        if: always()
        shell: bash
        run: |
          mkdir -p test-results
          docker compose -f docker-compose.integration.yaml ps -a \
            > test-results/compose-ps-final.txt 2>&1 || true
          docker compose -f docker-compose.integration.yaml logs --no-color \
            nats rabbitmq-init rabbitmq toxiproxy \
            > test-results/fault-brokers.log 2>&1 || true
          bash tool/ci/capture_rabbitmq_state.sh || true
      - name: Upload fault diagnostics
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: fault-${{ matrix.scenario }}-${{ env.PROFILE }}
          path: test-results
          if-no-files-found: error
          retention-days: 30
      - name: Stop services
        if: always()
        run: docker compose -f docker-compose.integration.yaml down -v --remove-orphans
