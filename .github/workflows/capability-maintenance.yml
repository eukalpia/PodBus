name: Capability maintenance

on:
  push:
    branches: [main]
    paths:
      - "packages/podbus_core/**"
      - "website/**"
      - ".github/workflows/capability-maintenance.yml"

permissions:
  contents: write

concurrency:
  group: capability-maintenance
  cancel-in-progress: true

env:
  NEXT_TELEMETRY_DISABLED: "1"

jobs:
  validate:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: main
          fetch-depth: 0

      - uses: dart-lang/setup-dart@65eb853c7ba17dde3be364c3d2858773e7144260 # v1.7.2
        with:
          sdk: 3.12.0

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: website/package-lock.json

      - name: Correct capability example
        run: |
          python3 - <<'PY'
          from pathlib import Path
          path = Path('website/content/core-concepts.ts')
          text = path.read_text()
          old = '    MessagingCapability.idempotency,'
          new = '    MessagingCapability.idempotentPublish,'
          if old not in text:
              raise SystemExit('Expected capability example was not found.')
          path.write_text(text.replace(old, new))
          PY

      - name: Validate Dart API
        run: |
          dart pub get
          dart format --output=none --set-exit-if-changed packages/podbus_core
          dart analyze packages/podbus_core
          dart test packages/podbus_core/test --exclude-tags=integration

      - name: Validate documentation
        working-directory: website
        run: |
          npm ci --no-audit --no-fund
          npm run typecheck
          GITHUB_ACTIONS=true npm run build

      - name: Commit validated changes
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git rm .github/workflows/capability-maintenance.yml
          git add packages/podbus_core website/content/core-concepts.ts
          git commit -m "Validate capability requirements and examples"
          git push origin HEAD:main
