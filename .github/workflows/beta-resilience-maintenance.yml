name: Beta resilience maintenance

on:
  push:
    branches: [beta-resilience-nats-rabbitmq]
    paths:
      - "packages/podbus_nats/**"
      - "packages/podbus_rabbitmq/**"
      - ".github/workflows/beta-resilience-maintenance.yml"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: beta-resilience-maintenance
  cancel-in-progress: true

jobs:
  validate:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: beta-resilience-nats-rabbitmq
          fetch-depth: 0

      - uses: dart-lang/setup-dart@65eb853c7ba17dde3be364c3d2858773e7144260 # v1.7.2
        with:
          sdk: 3.12.0

      - name: Apply resilience implementation
        run: |
          python3 - <<'PY'
          from pathlib import Path

          def replace(path, old, new):
              file = Path(path)
              text = file.read_text()
              if old not in text:
                  raise SystemExit(f'Expected fragment not found in {path}: {old[:120]!r}')
              file.write_text(text.replace(old, new, 1))

          nats = 'packages/podbus_nats/lib/src/nats_jetstream_job_queue.dart'
          replace(
              nats,
              """    Duration fetchTimeout = const Duration(seconds: 1),
    int fetchBatchSize = 1,
  }) : messagingConfig = messagingConfig ?? MessagingConfig(codec: codec),""",
              """    Duration fetchTimeout = const Duration(seconds: 1),
    int fetchBatchSize = 1,
    Duration inProgressInterval = const Duration(seconds: 20),
    Duration workerRecoveryInitialDelay = const Duration(milliseconds: 100),
    Duration workerRecoveryMaxDelay = const Duration(seconds: 5),
  }) : messagingConfig = messagingConfig ?? MessagingConfig(codec: codec),""",
          )
          replace(
              nats,
              """       _idempotencyTtl = idempotencyTtl,
       _fetchTimeout = fetchTimeout,
       _fetchBatchSize = fetchBatchSize {
    if (fetchBatchSize < 1) {""",
              """       _idempotencyTtl = idempotencyTtl,
       _fetchTimeout = fetchTimeout,
       _fetchBatchSize = fetchBatchSize,
       _inProgressInterval = inProgressInterval,
       _workerRecoveryInitialDelay = workerRecoveryInitialDelay,
       _workerRecoveryMaxDelay = workerRecoveryMaxDelay {
    if (fetchBatchSize < 1) {""",
          )
          replace(
              nats,
              """    if (fetchBatchSize < 1) {
      throw const MessagingConfigurationException(
        'NATS JetStream fetch batch size must be greater than zero.',
      );
    }
  }""",
              """    if (fetchBatchSize < 1) {
      throw const MessagingConfigurationException(
        'NATS JetStream fetch batch size must be greater than zero.',
      );
    }
    if (inProgressInterval.isNegative) {
      throw const MessagingConfigurationException(
        'NATS JetStream in-progress interval must not be negative.',
      );
    }
    if (workerRecoveryInitialDelay.isNegative ||
        workerRecoveryMaxDelay.isNegative ||
        workerRecoveryMaxDelay < workerRecoveryInitialDelay) {
      throw const MessagingConfigurationException(
        'NATS JetStream worker recovery delays are invalid.',
      );
    }
  }""",
          )
          replace(
              nats,
              """  final Duration _fetchTimeout;
  final int _fetchBatchSize;
  final List<_NatsJetStreamWorker<Object?>> _workers = [];""",
              """  final Duration _fetchTimeout;
  final int _fetchBatchSize;
  final Duration _inProgressInterval;
  final Duration _workerRecoveryInitialDelay;
  final Duration _workerRecoveryMaxDelay;
  final List<_NatsJetStreamWorker<Object?>> _workers = [];""",
          )
          replace(
              nats,
              """      fetchTimeout: _fetchTimeout,
      fetchBatchSize: _fetchBatchSize,
      consumer: consumer,""",
              """      fetchTimeout: _fetchTimeout,
      fetchBatchSize: _fetchBatchSize,
      inProgressInterval: _inProgressInterval,
      recoveryInitialDelay: _workerRecoveryInitialDelay,
      recoveryMaxDelay: _workerRecoveryMaxDelay,
      consumer: consumer,""",
          )
          replace(
              nats,
              """    required this.fetchTimeout,
    required this.fetchBatchSize,
    required this.consumer,""",
              """    required this.fetchTimeout,
    required this.fetchBatchSize,
    required this.inProgressInterval,
    required this.recoveryInitialDelay,
    required this.recoveryMaxDelay,
    required this.consumer,""",
          )
          replace(
              nats,
              """  final Duration fetchTimeout;
  final int fetchBatchSize;
  final NatsJetStreamConsumer consumer;""",
              """  final Duration fetchTimeout;
  final int fetchBatchSize;
  final Duration inProgressInterval;
  final Duration recoveryInitialDelay;
  final Duration recoveryMaxDelay;
  final NatsJetStreamConsumer consumer;""",
          )
          replace(
              nats,
              """  Future<void> _run() async {
    while (!_closed) {
      try {
        final messages = await consumer.fetch(
          batch: fetchBatchSize,
          timeout: fetchTimeout,
        );
        if (messages.isEmpty) {
          continue;
        }
        for (final message in messages) {
          if (_closed) {
            return;
          }
          await _process(message);
        }
      } on Object catch (error, stackTrace) {
        lastError = error;
        lastStackTrace = stackTrace;
        queue.messagingConfig.log(
          MessagingLogLevel.error,
          'NATS JetStream worker loop failed.',
          error: error,
          stackTrace: stackTrace,
          attributes: {
            'transport': 'nats-jetstream',
            'topic': topic,
            'consumer': consumerName,
          },
        );
        await Future<void>.delayed(const Duration(milliseconds: 200));
      }
    }
  }""",
              """  Future<void> _run() async {
    var consecutiveFailures = 0;
    while (!_closed) {
      try {
        final messages = await consumer.fetch(
          batch: fetchBatchSize,
          timeout: fetchTimeout,
        );
        consecutiveFailures = 0;
        if (messages.isEmpty) {
          continue;
        }
        for (final message in messages) {
          if (_closed) {
            return;
          }
          await _process(message);
        }
      } on Object catch (error, stackTrace) {
        consecutiveFailures += 1;
        lastError = error;
        lastStackTrace = stackTrace;
        queue.messagingConfig.log(
          MessagingLogLevel.error,
          'NATS JetStream worker loop failed.',
          error: error,
          stackTrace: stackTrace,
          attributes: {
            'transport': 'nats-jetstream',
            'topic': topic,
            'consumer': consumerName,
            'consecutiveFailures': consecutiveFailures,
          },
        );
        final exponential = recoveryInitialDelay.inMicroseconds *
            math.pow(2, consecutiveFailures - 1).toDouble();
        final delay = Duration(
          microseconds: math.min(
            exponential,
            recoveryMaxDelay.inMicroseconds.toDouble(),
          ).round(),
        );
        if (delay > Duration.zero) {
          await Future<void>.delayed(delay);
        }
      }
    }
  }""",
          )
          replace(
              nats,
              """      final payload = await queue._decode<T>(message);
      await handler(context, payload);
      if (!context.completed) {
        await context.ack();
      }
      queue.messagingConfig.recordMetric(""",
              """      final payload = await queue._decode<T>(message);
      final heartbeat = _NatsInProgressHeartbeat(
        message: message,
        interval: inProgressInterval,
        onError: (error, stackTrace) {
          lastError = error;
          lastStackTrace = stackTrace;
          queue.messagingConfig.log(
            MessagingLogLevel.error,
            'NATS JetStream in-progress heartbeat failed.',
            error: error,
            stackTrace: stackTrace,
            attributes: {
              'transport': 'nats-jetstream',
              'topic': topic,
              'consumer': consumerName,
            },
          );
        },
      )..start();
      try {
        await handler(context, payload);
      } finally {
        await heartbeat.stop();
      }
      if (!context.completed) {
        await context.ack();
      }
      lastError = null;
      lastStackTrace = null;
      queue.messagingConfig.recordMetric(""",
          )
          marker = "final class _NatsJetStreamJobContext implements JobContext {"
          helper = """final class _NatsInProgressHeartbeat {
  _NatsInProgressHeartbeat({
    required this.message,
    required this.interval,
    required this.onError,
  });

  final NatsJetStreamMessage message;
  final Duration interval;
  final void Function(Object error, StackTrace stackTrace) onError;
  Timer? _timer;
  Future<void>? _active;
  var _stopped = false;

  void start() {
    if (interval <= Duration.zero) {
      return;
    }
    _timer = Timer.periodic(interval, (_) => _tick());
  }

  void _tick() {
    if (_stopped || _active != null) {
      return;
    }
    late final Future<void> task;
    task = Future<void>.sync(() async {
      final sent = await message.inProgress();
      if (!sent) {
        throw const MessagingConnectionException(
          'NATS JetStream in-progress heartbeat was not accepted.',
        );
      }
    }).then<void>(
      (_) {},
      onError: (Object error, StackTrace stackTrace) {
        onError(error, stackTrace);
      },
    ).whenComplete(() {
      if (identical(_active, task)) {
        _active = null;
      }
    });
    _active = task;
  }

  Future<void> stop() async {
    _stopped = true;
    _timer?.cancel();
    final active = _active;
    if (active != null) {
      await active;
    }
  }
}

"""
          file = Path(nats)
          text = file.read_text()
          if marker not in text:
              raise SystemExit('NATS context marker missing')
          file.write_text(text.replace(marker, helper + marker, 1))

          rabbit = 'packages/podbus_rabbitmq/lib/src/rabbitmq_message_bus.dart'
          replace(
              rabbit,
              """  void _recordWorkerError(Object error) {
    _lastWorkerError = error;
    _lastWorkerErrorAt = messagingConfig.now();
  }
""",
              """  void _recordWorkerError(Object error) {
    _lastWorkerError = error;
    _lastWorkerErrorAt = messagingConfig.now();
  }

  void _clearWorkerError() {
    _lastWorkerError = null;
    _lastWorkerErrorAt = null;
  }
""",
          )
          replace(
              rabbit,
              """      bus.messagingConfig.recordMetric(
        'podbus.jobs.completed',
        attributes: {'transport': 'rabbitmq', 'topic': topic},
      );""",
              """      bus._clearWorkerError();
      bus.messagingConfig.recordMetric(
        'podbus.jobs.completed',
        attributes: {'transport': 'rabbitmq', 'topic': topic},
      );""",
          )

          nats_test = Path('packages/podbus_nats/test/nats_resilience_test.dart')
          text = nats_test.read_text()
          text = text.replace("import 'dart:async';", "import 'dart:async';\nimport 'dart:convert';")
          old = """  _Message(this.subject, Map<String, Object?> payload, {this.deliveryCount = 1})
    : bytes = JsonMessageCodec().encode(payload).then((value) => value.bytes) as dynamic;

  _Message.raw(this.subject, this.bytes, {this.deliveryCount = 1});"""
          new = """  _Message(this.subject, Map<String, Object?> payload, {this.deliveryCount = 1})
    : bytes = utf8.encode(jsonEncode(payload));"""
          if old not in text:
              raise SystemExit('NATS test constructor fragment missing')
          nats_test.write_text(text.replace(old, new, 1))

          rabbit_test = Path('packages/podbus_rabbitmq/test/rabbitmq_resilience_test.dart')
          text = rabbit_test.read_text()
          old = "final class _Adapter implements RabbitMqAdapter {\n  final consumer = _Consumer();"
          new = "final class _Adapter implements RabbitMqAdapter {\n  _Adapter() {\n    _currentAdapterEvents = events;\n  }\n\n  final consumer = _Consumer();"
          if old not in text:
              raise SystemExit('Rabbit adapter fragment missing')
          rabbit_test.write_text(text.replace(old, new, 1))
          PY

      - name: Resolve dependencies
        run: dart pub get

      - name: Format
        run: dart format packages/podbus_nats packages/podbus_rabbitmq

      - name: Analyze
        id: analyze
        continue-on-error: true
        run: dart analyze packages/podbus_nats packages/podbus_rabbitmq 2>&1 | tee beta-resilience-analyze.log

      - name: Run NATS resilience tests
        id: nats
        continue-on-error: true
        run: dart test packages/podbus_nats/test/nats_resilience_test.dart --reporter=expanded 2>&1 | tee nats-resilience-test.log

      - name: Run RabbitMQ resilience tests
        id: rabbit
        continue-on-error: true
        run: dart test packages/podbus_rabbitmq/test/rabbitmq_resilience_test.dart --reporter=expanded 2>&1 | tee rabbit-resilience-test.log

      - name: Run existing transport unit suites
        id: existing
        continue-on-error: true
        run: |
          dart test packages/podbus_nats/test packages/podbus_rabbitmq/test --exclude-tags=integration --reporter=expanded 2>&1 | tee existing-transport-tests.log

      - name: Commit result
        env:
          ANALYZE: ${{ steps.analyze.outcome }}
          NATS: ${{ steps.nats.outcome }}
          RABBIT: ${{ steps.rabbit.outcome }}
          EXISTING: ${{ steps.existing.outcome }}
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git rm .github/workflows/beta-resilience-maintenance.yml
          if [ "$ANALYZE" = success ] && [ "$NATS" = success ] && [ "$RABBIT" = success ] && [ "$EXISTING" = success ]; then
            rm -f beta-resilience-analyze.log nats-resilience-test.log rabbit-resilience-test.log existing-transport-tests.log
            git add packages/podbus_nats packages/podbus_rabbitmq
            git commit -m "Harden NATS and RabbitMQ worker resilience"
          else
            git add packages/podbus_nats packages/podbus_rabbitmq beta-resilience-analyze.log nats-resilience-test.log rabbit-resilience-test.log existing-transport-tests.log
            git commit -m "Record transport resilience diagnostics"
          fi
          git push origin HEAD:beta-resilience-nats-rabbitmq
