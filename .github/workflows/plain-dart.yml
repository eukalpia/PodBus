name: Plain Dart deployment

on:
  pull_request:
    paths:
      - "packages/podbus_core/**"
      - "packages/podbus_nats/**"
      - "examples/plain_dart_service/**"
      - "tool/ci/start_integration_services.sh"
      - "docker-compose.integration.yaml"
      - "pubspec.yaml"
      - "pubspec.lock"
      - ".github/workflows/plain-dart.yml"
  push:
    branches: [main]
    paths:
      - "packages/podbus_core/**"
      - "packages/podbus_nats/**"
      - "examples/plain_dart_service/**"
      - "tool/ci/start_integration_services.sh"
      - "docker-compose.integration.yaml"
      - "pubspec.yaml"
      - "pubspec.lock"
      - ".github/workflows/plain-dart.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: plain-dart-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  DART_SDK: 3.12.0

jobs:
  deployment-smoke:
    name: Plain Dart process smoke
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - uses: dart-lang/setup-dart@65eb853c7ba17dde3be364c3d2858773e7144260
        with:
          sdk: ${{ env.DART_SDK }}
      - name: Resolve dependencies
        run: dart pub get
      - name: Start clean NATS
        run: bash tool/ci/start_integration_services.sh nats
      - name: Wait for NATS
        run: bash tool/ci/wait_for_nats.sh
      - name: Run service and independent probe
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p test-results
          dart run examples/plain_dart_service/bin/main.dart \
            > test-results/plain-dart-service.log 2>&1 &
          service_pid=$!

          cleanup() {
            if kill -0 "$service_pid" 2>/dev/null; then
              kill -TERM "$service_pid" 2>/dev/null || true
              wait "$service_pid" 2>/dev/null || true
            fi
          }
          trap cleanup EXIT

          dart run examples/plain_dart_service/bin/probe.dart \
            | tee test-results/plain-dart-probe.log

          for _ in $(seq 1 100); do
            if ! kill -0 "$service_pid" 2>/dev/null; then
              wait "$service_pid"
              trap - EXIT
              exit 0
            fi
            sleep 0.1
          done

          echo "Plain Dart service did not shut down within 10 seconds." >&2
          exit 1
      - name: Capture NATS diagnostics
        if: always()
        run: |
          mkdir -p test-results
          docker compose -f docker-compose.integration.yaml logs --no-color nats \
            > test-results/plain-dart-nats.log 2>&1 || true
      - name: Upload deployment evidence
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: plain-dart-deployment-evidence
          path: test-results
          if-no-files-found: error
          retention-days: 30
      - name: Stop NATS
        if: always()
        run: docker compose -f docker-compose.integration.yaml down -v --remove-orphans
