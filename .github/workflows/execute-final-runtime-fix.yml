name: Execute final runtime fix

on:
  pull_request:
    paths:
      - "tool/qualification/trigger-final-runtime-fix.txt"

permissions:
  contents: write

concurrency:
  group: execute-final-runtime-fix
  cancel-in-progress: true

jobs:
  patch-validate-publish:
    runs-on: ubuntu-latest
    timeout-minutes: 35
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: docs/beta-candidate-evidence
          fetch-depth: 0
      - uses: dart-lang/setup-dart@65eb853c7ba17dde3be364c3d2858773e7144260
        with:
          sdk: 3.12.0
      - name: Apply final runtime patch from main
        shell: bash
        run: |
          git fetch origin main
          git show origin/main:tool/ci/apply_final_runtime_fix.py > /tmp/apply_final_runtime_fix.py
          python3 /tmp/apply_final_runtime_fix.py
      - name: Validate source and unit regressions
        run: |
          dart pub get
          dart format packages/podbus_core/lib/src/resilience.dart \
            packages/podbus_nats/lib/src/nats_jetstream_adapter.dart
          dart analyze packages/podbus_core
          dart analyze packages/podbus_nats
          dart test packages/podbus_core/test/resilience_test.dart --reporter=expanded
          dart test packages/podbus_nats/test --exclude-tags=integration --reporter=expanded
      - name: Start clean brokers and Toxiproxy
        run: bash tool/ci/start_integration_services.sh nats rabbitmq toxiproxy
      - name: Wait for services
        run: |
          bash tool/ci/wait_for_nats.sh
          bash tool/ci/wait_for_rabbitmq.sh
          bash tool/ci/wait_for_toxiproxy.sh
      - name: Verify fault processes terminate cleanly
        run: |
          timeout --signal=TERM --kill-after=15s 3m \
            dart run tool/fault_suite.dart \
              --profile=smoke \
              --scenario=nats-tcp-partition,rabbitmq-tcp-partition,rabbitmq-channel-failures \
              --report=test-results/final-runtime-fault-smoke.json
      - name: Verify reconnectable NATS errors during short soak
        run: |
          timeout --signal=TERM --kill-after=15s 8m \
            dart run tool/soak_resilience.dart \
              --duration=2m \
              --allow-short=true \
              --fault-interval=10s \
              --outage=2s \
              --publish-interval=25ms \
              --max-operation-errors=0 \
              --report=test-results/final-runtime-soak.json
      - name: Stop services
        if: always()
        run: docker compose -f docker-compose.integration.yaml down -v --remove-orphans
      - name: Publish source-only fix
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add packages/podbus_core/lib/src/resilience.dart \
            packages/podbus_nats/lib/src/nats_jetstream_adapter.dart
          git commit -m "Finish recovery shutdown and NATS error translation"
          git push origin HEAD:automation/final-runtime-fix --force-with-lease
