name: RabbitMQ maintenance

on:
  push:
    branches:
      - agent-production-foundation

permissions:
  contents: write

concurrency:
  group: rabbitmq-maintenance-${{ github.ref }}
  cancel-in-progress: true

jobs:
  patch:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: agent-production-foundation
          fetch-depth: 0
      - uses: dart-lang/setup-dart@65eb853c7ba17dde3be364c3d2858773e7144260 # v1.7.2
        with:
          sdk: 3.12.0
      - run: python3 tool/ci/apply_rabbitmq_hardening.py
      - run: dart pub get
      - run: dart format .
      - run: dart analyze .
      - run: dart test packages/podbus_rabbitmq/test --exclude-tags=integration
      - name: Commit hardening
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .
          git commit -m "Harden RabbitMQ routing and retry delivery"
          git push origin HEAD:agent-production-foundation
