name: Security

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    - cron: "17 3 * * 1"
  workflow_dispatch:

permissions:
  contents: read
  security-events: write

jobs:
  codeql-actions:
    name: CodeQL workflow scan
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: github/codeql-action/init@02c5e83432fe5497fd85b873b6c9f16a8578e1d9 # v3
        with:
          languages: actions
          queries: security-extended
      - uses: github/codeql-action/analyze@02c5e83432fe5497fd85b873b6c9f16a8578e1d9 # v3
        with:
          category: /language:actions

  dependency-review:
    name: Dependency review
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - id: review
        continue-on-error: true
        uses: actions/dependency-review-action@2031cfc080254a8a887f58cffee85186f0e49e48 # v4.9.0
        with:
          fail-on-severity: moderate
          comment-summary-in-pr: always
          license-check: true
          deny-licenses: GPL-2.0, GPL-3.0, AGPL-1.0, AGPL-3.0
          retry-on-snapshot-warnings: true
          retry-on-snapshot-warnings-timeout: 300
      - name: Save dependency-review diagnostics
        if: always()
        env:
          COMMENT_CONTENT: ${{ steps.review.outputs.comment-content }}
          DEPENDENCY_CHANGES: ${{ steps.review.outputs.dependency-changes }}
          VULNERABLE_CHANGES: ${{ steps.review.outputs.vulnerable-changes }}
          INVALID_LICENSE_CHANGES: ${{ steps.review.outputs.invalid-license-changes }}
          DENIED_CHANGES: ${{ steps.review.outputs.denied-changes }}
        run: |
          mkdir -p dependency-review
          printf '%s\n' "$COMMENT_CONTENT" > dependency-review/summary.md
          printf '%s\n' "$DEPENDENCY_CHANGES" > dependency-review/dependency-changes.json
          printf '%s\n' "$VULNERABLE_CHANGES" > dependency-review/vulnerable-changes.json
          printf '%s\n' "$INVALID_LICENSE_CHANGES" > dependency-review/invalid-license-changes.json
          printf '%s\n' "$DENIED_CHANGES" > dependency-review/denied-changes.json
      - name: Upload dependency-review diagnostics
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: dependency-review-diagnostics
          path: dependency-review
          if-no-files-found: error
          retention-days: 14
      - name: Enforce dependency review
        if: steps.review.outcome == 'failure'
        run: exit 1

  secrets:
    name: Secret scan
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@ff98106e4c7b2bc287b24eaf42907196329070c7 # v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
