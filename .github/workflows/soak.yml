name: Resilience soak

on:
  pull_request:
  schedule:
    - cron: "17 2 * * 0"
  workflow_dispatch:
    inputs:
      duration:
        description: Duration accepted by tool/soak_resilience.dart (1h to 24h)
        required: true
        default: 1h
        type: string
      allow_short:
        description: Permit a sub-hour smoke run
        required: true
        default: false
        type: boolean

permissions:
  contents: read

concurrency:
  group: podbus-resilience-soak-qualification
  cancel-in-progress: true

env:
  DART_SDK: 3.12.0
  SOAK_DURATION: ${{ github.event_name == 'workflow_dispatch' && inputs.duration || '1h' }}
  ALLOW_SHORT: ${{ github.event_name == 'workflow_dispatch' && inputs.allow_short || false }}

jobs:
  changes:
    name: Detect soak qualification request
    runs-on: ubuntu-latest
    outputs:
      run: ${{ steps.detect.outputs.run }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
          fetch-depth: 2
      - id: detect
        shell: bash
        run: |
          set -euo pipefail
          if [[ "${{ github.event_name }}" == "workflow_dispatch" || "${{ github.event_name }}" == "schedule" ]]; then
            echo "run=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          changed="$(git diff --name-only HEAD^ HEAD)"
          printf '%s\n' "$changed"
          if grep -Eq '^(packages/podbus_(core|nats|rabbitmq)/|tool/(soak_resilience|fault_|src/fault_harness|ci/(start_integration_services|capture_rabbitmq_state|wait_for_rabbitmq)|qualification/beta-candidate)|docker-compose\.integration\.yaml$|\.github/workflows/soak\.yml$)' <<< "$changed"; then
            echo "run=true" >> "$GITHUB_OUTPUT"
          else
            echo "run=false" >> "$GITHUB_OUTPUT"
          fi

  soak:
    name: NATS and RabbitMQ one-hour soak
    needs: changes
    if: needs.changes.outputs.run == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 360
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - uses: dart-lang/setup-dart@65eb853c7ba17dde3be364c3d2858773e7144260
        with:
          sdk: ${{ env.DART_SDK }}
      - name: Reject unsupported hosted duration
        shell: bash
        run: |
          python3 - <<'PY'
          import os, re
          value = os.environ['SOAK_DURATION']
          match = re.fullmatch(r'(\d+)(ms|s|m|h)', value)
          if not match:
              raise SystemExit(f'invalid duration: {value}')
          amount, unit = int(match.group(1)), match.group(2)
          seconds = amount * {'ms': .001, 's': 1, 'm': 60, 'h': 3600}[unit]
          if seconds > 5 * 3600:
              raise SystemExit(
                  'GitHub-hosted jobs are capped at six hours. Run durations '
                  'above 5h on a dedicated host with: '
                  'dart run tool/soak_resilience.dart --duration=<1h..24h>'
              )
          PY
      - name: Resolve dependencies
        run: dart pub get
      - name: Start clean brokers and Toxiproxy
        run: bash tool/ci/start_integration_services.sh nats rabbitmq toxiproxy
      - name: Wait for services
        run: |
          bash tool/ci/wait_for_nats.sh
          bash tool/ci/wait_for_rabbitmq.sh
          bash tool/ci/wait_for_toxiproxy.sh
      - name: Run resilience soak
        shell: bash
        run: |
          set -euo pipefail
          duration_seconds="$(python3 - <<'PY'
          import os, re
          value = os.environ['SOAK_DURATION']
          amount, unit = re.fullmatch(r'(\d+)(ms|s|m|h)', value).groups()
          seconds = int(amount) * {'ms': .001, 's': 1, 'm': 60, 'h': 3600}[unit]
          print(max(1, int(seconds)))
          PY
          )"
          watchdog_seconds=$((duration_seconds + 600))
          timeout --signal=TERM --kill-after=30s "${watchdog_seconds}s" \
            dart run tool/soak_resilience.dart \
              --duration="${SOAK_DURATION}" \
              --allow-short="${ALLOW_SHORT}" \
              --report=test-results/soak-summary.json
      - name: Publish soak summary
        if: always()
        shell: bash
        run: |
          if [[ -s test-results/soak-summary.json ]]; then
            {
              echo '## PodBus resilience soak'
              echo '```json'
              cat test-results/soak-summary.json
              echo '```'
            } >> "$GITHUB_STEP_SUMMARY"
          fi
      - name: Capture broker logs
        if: always()
        shell: bash
        run: |
          mkdir -p test-results
          docker compose -f docker-compose.integration.yaml logs --no-color \
            nats rabbitmq-init rabbitmq toxiproxy > test-results/soak-brokers.log 2>&1 || true
          bash tool/ci/capture_rabbitmq_state.sh || true
      - name: Upload soak evidence
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: resilience-soak-${{ env.SOAK_DURATION }}
          path: test-results
          if-no-files-found: warn
          retention-days: 90
      - name: Stop services
        if: always()
        run: docker compose -f docker-compose.integration.yaml down -v --remove-orphans
