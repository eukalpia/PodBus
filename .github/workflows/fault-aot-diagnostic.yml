name: Fault AOT diagnostic

on:
  pull_request:
    paths:
      - "tool/qualification/trigger-fault-aot.txt"

permissions:
  contents: read

jobs:
  fault:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        scenario: [nats-tcp-partition, rabbitmq-tcp-partition, rabbitmq-channel-failures]
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: docs/beta-candidate-evidence
      - uses: dart-lang/setup-dart@65eb853c7ba17dde3be364c3d2858773e7144260
        with:
          sdk: 3.12.0
      - run: dart pub get
      - name: Compile fault suite
        run: dart compile exe tool/fault_suite.dart -o /tmp/podbus-fault-suite
      - run: |
          bash tool/ci/start_integration_services.sh nats rabbitmq toxiproxy
          bash tool/ci/wait_for_nats.sh
          bash tool/ci/wait_for_rabbitmq.sh
          bash tool/ci/wait_for_toxiproxy.sh
      - name: Run AOT scenario and require clean exit
        run: timeout --signal=TERM --kill-after=5s 2m /tmp/podbus-fault-suite --profile=smoke --scenario=${{ matrix.scenario }} --report=test-results/${{ matrix.scenario }}.json
      - if: always()
        run: docker compose -f docker-compose.integration.yaml down -v --remove-orphans
