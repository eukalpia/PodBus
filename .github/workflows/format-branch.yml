name: Format production foundation

on:
  push:
    branches:
      - agent-production-foundation

permissions:
  contents: write

jobs:
  format:
    if: ${{ github.actor != 'github-actions[bot]' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent-production-foundation
      - uses: dart-lang/setup-dart@v1
        with:
          sdk: 3.12.0
      - name: Resolve dependencies
        run: dart pub get
      - name: Format source
        run: dart format .
      - name: Commit formatting
        run: |
          rm .github/workflows/format-branch.yml
          git config user.name "PodBus Automation"
          git config user.email "actions@users.noreply.github.com"
          git add -A
          git commit -m "Format Dart source"
          git push
