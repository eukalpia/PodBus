name: Apply dart_amqp publisher-confirm fix

on:
  pull_request:
    paths:
      - ".github/workflows/apply-dart-amqp-confirm-fix.yml"
      - "tool/ci/vendor_dart_amqp_patch.py"
      - "tool/qualification/dart-amqp-confirm-fix-trigger.txt"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: apply-dart-amqp-confirm-fix
  cancel-in-progress: true

jobs:
  publish-generated-source:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: fix/rabbitmq-publisher-lanes
          fetch-depth: 0
      - uses: dart-lang/setup-dart@65eb853c7ba17dde3be364c3d2858773e7144260
        with:
          sdk: 3.12.0
      - name: Vendor pinned upstream source
        run: |
          set -euo pipefail
          rm -rf third_party/dart_amqp /tmp/dart_amqp
          git clone --filter=blob:none --no-checkout \
            https://github.com/achilleasa/dart_amqp.git /tmp/dart_amqp
          git -C /tmp/dart_amqp checkout --detach \
            577c34cead6c559eec3cda0bf002c45b19f8500b
          mkdir -p third_party/dart_amqp
          rsync -a \
            --exclude=.git \
            --exclude=.github \
            --exclude=coverage \
            /tmp/dart_amqp/ third_party/dart_amqp/
      - name: Apply reproducible PodBus patches
        run: python3 tool/ci/vendor_dart_amqp_patch.py
      - name: Resolve PodBus workspace
        run: dart pub get
      - name: Publish generated vendor commit
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add \
            third_party/dart_amqp \
            packages/podbus_rabbitmq/pubspec.yaml \
            pubspec.lock
          git commit -m "Patch dart_amqp publisher confirmations"
          git push origin HEAD:automation/dart-amqp-confirm-fix
