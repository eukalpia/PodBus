# Registered trigger revision.
name: Apply health-probe shutdown fix

on:
  push:
    branches: [main]
    paths: [".github/workflows/apply-health-probe-shutdown-fix.yml"]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: apply-health-probe-shutdown-fix
  cancel-in-progress: true

jobs:
  patch-validate-publish:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: docs/beta-candidate-evidence
          fetch-depth: 0
      - uses: dart-lang/setup-dart@65eb853c7ba17dde3be364c3d2858773e7144260
        with:
          sdk: 3.12.0
      - name: Apply late-probe generation guards and regressions
        shell: bash
        run: |
          python3 - <<'PY'
          from pathlib import Path

          p = Path('packages/podbus_core/lib/src/resilience.dart')
          s = p.read_text()
          old = """    final delegate = _delegate;
              if (delegate == null) {
                return;
              }
              _probeActive = true;
          """
          new = """    final delegate = _delegate;
              if (delegate == null) {
                return;
              }
              final generation = _generation;
              _probeActive = true;
          """
          assert s.count(old) == 2, s.count(old)
          s = s.replace(old, new)
          old = """      if (result.status == HealthStatus.unhealthy && !_closing) {
          """
          new = """      if (result.status == HealthStatus.unhealthy &&
                  !_closing &&
                  generation == _generation &&
                  identical(delegate, _delegate)) {
          """
          assert s.count(old) == 2, s.count(old)
          s = s.replace(old, new)
          old = """    } on Object catch (error) {
              if (!_closing) {
                try {
                  await _recover(
          """
          new = """    } on Object catch (error) {
              if (!_closing &&
                  generation == _generation &&
                  identical(delegate, _delegate)) {
                try {
                  await _recover(
          """
          assert s.count(old) == 2, s.count(old)
          p.write_text(s.replace(old, new))

          p = Path('packages/podbus_core/test/resilience_test.dart')
          s = p.read_text()
          pairs = [
            ("""  _FakeMessageBus({
              this.connectGate,
              this.closeGate,
              this.connectError,
              this.subscribeError,
            });
          """, """  _FakeMessageBus({
              this.connectGate,
              this.closeGate,
              this.healthGate,
              this.connectError,
              this.subscribeError,
            });
          """),
            ("""  final Future<void>? closeGate;
            final Object? connectError;
          """, """  final Future<void>? closeGate;
            final Future<HealthCheckResult>? healthGate;
            final Object? connectError;
          """),
            ("  _FakeDurableQueue({this.connectGate, this.closeGate, this.connectError});\n", """  _FakeDurableQueue({
              this.connectGate,
              this.closeGate,
              this.healthGate,
              this.connectError,
            });
          """),
            ("""  final Future<void>? closeGate;
            final Object? connectError;
            final List<_FakeWorker> workers = [];
          """, """  final Future<void>? closeGate;
            final Future<HealthCheckResult>? healthGate;
            final Object? connectError;
            final List<_FakeWorker> workers = [];
          """),
          ]
          for old, new in pairs:
            assert old in s, old[:40]
            s = s.replace(old, new, 1)
          old = """  Future<HealthCheckResult> healthCheck() async {
              return connected
                  ? HealthCheckResult.healthy(message: 'connected')
                  : HealthCheckResult.unhealthy(message: 'disconnected');
            }
          """
          new = """  Future<HealthCheckResult> healthCheck() async {
              healthChecks += 1;
              final gate = healthGate;
              if (gate != null) return gate;
              return connected
                  ? HealthCheckResult.healthy(message: 'connected')
                  : HealthCheckResult.unhealthy(message: 'disconnected');
            }
          """
          assert s.count(old) == 2, s.count(old)
          s = s.replace(old, new)
          s = s.replace('  int closedSubscriptions = 0;\n', '  int closedSubscriptions = 0;\n  int healthChecks = 0;\n', 1)
          s = s.replace('  int closedWorkers = 0;\n', '  int closedWorkers = 0;\n  int healthChecks = 0;\n', 1)

          bus_test = """
              test('ignores a health probe completed after message-bus close', () async {
                final gate = Completer<HealthCheckResult>();
                final delegates = <_FakeMessageBus>[];
                final bus = ResilientMessageBus(
                  factory: () {
                    final value = _FakeMessageBus(
                      healthGate: delegates.isEmpty ? gate.future : null,
                    );
                    delegates.add(value);
                    return value;
                  },
                  policy: const ReconnectPolicy(
                    initialDelay: Duration.zero,
                    maxDelay: Duration.zero,
                    jitter: 0,
                    healthCheckInterval: Duration(milliseconds: 1),
                    healthCheckTimeout: Duration(seconds: 1),
                  ),
                );
                await bus.connect();
                await _waitUntil(() => delegates.first.healthChecks > 0);
                await bus.close(timeout: const Duration(milliseconds: 100));
                gate.complete(HealthCheckResult.unhealthy(message: 'late'));
                await Future<void>.delayed(const Duration(milliseconds: 30));
                expect(delegates, hasLength(1));
                await bus.close();
              });

          """
          marker = "  });\n\n  group('ResilientDurableJobQueue', () {\n"
          assert marker in s
          s = s.replace(marker, bus_test + marker, 1)

          queue_test = """
              test('ignores a health probe completed after durable-queue close', () async {
                final gate = Completer<HealthCheckResult>();
                final delegates = <_FakeDurableQueue>[];
                final queue = ResilientDurableJobQueue(
                  factory: () {
                    final value = _FakeDurableQueue(
                      healthGate: delegates.isEmpty ? gate.future : null,
                    );
                    delegates.add(value);
                    return value;
                  },
                  policy: const ReconnectPolicy(
                    initialDelay: Duration.zero,
                    maxDelay: Duration.zero,
                    jitter: 0,
                    healthCheckInterval: Duration(milliseconds: 1),
                    healthCheckTimeout: Duration(seconds: 1),
                  ),
                );
                await queue.connect();
                await _waitUntil(() => delegates.first.healthChecks > 0);
                await queue.close(timeout: const Duration(milliseconds: 100));
                gate.complete(HealthCheckResult.unhealthy(message: 'late'));
                await Future<void>.delayed(const Duration(milliseconds: 30));
                expect(delegates, hasLength(1));
                await queue.close();
              });

          """
          marker = "  group('ResilientDurableJobQueue', () {\n"
          assert marker in s
          p.write_text(s.replace(marker, marker + queue_test, 1))
          PY
      - name: Validate
        run: |
          dart pub get
          dart format packages/podbus_core/lib/src/resilience.dart packages/podbus_core/test/resilience_test.dart
          dart analyze packages/podbus_core
          dart test packages/podbus_core/test/resilience_test.dart --reporter=expanded
      - name: Publish validated commit
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add packages/podbus_core/lib/src/resilience.dart packages/podbus_core/test/resilience_test.dart
          git commit -m "Prevent late health probes from reconnecting after shutdown"
          git fetch origin automation/health-probe-shutdown-fix
          git rebase origin/automation/health-probe-shutdown-fix
          git push origin HEAD:automation/health-probe-shutdown-fix
