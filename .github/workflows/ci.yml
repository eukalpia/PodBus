name: CI

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: recovery-task-drain-${{ github.ref }}
  cancel-in-progress: true

env:
  DART_SDK: 3.12.0

jobs:
  recovery-task-drain:
    name: Fault harness lifecycle validation
    if: github.event_name == 'pull_request' && github.head_ref == 'trigger/recovery-task-drain-v3'
    runs-on: ubuntu-latest
    timeout-minutes: 35
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: automation/recovery-task-drain
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}
      - uses: dart-lang/setup-dart@65eb853c7ba17dde3be364c3d2858773e7144260
        with:
          sdk: ${{ env.DART_SDK }}
      - name: Apply recovery patch and validate source
        run: |
          python3 tool/ci/apply_recovery_task_drain.py
          dart format \
            packages/podbus_core/lib/src/resilience.dart \
            tool/src/fault_harness.dart
          dart pub get
          dart analyze .
          dart test packages/podbus_core/test/resilience_test.dart
      - name: Validate AOT fault scenarios and clean process exit
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p build test-results
          dart compile exe tool/fault_suite.dart -o build/podbus-fault-suite
          bash tool/ci/start_integration_services.sh nats rabbitmq toxiproxy
          bash tool/ci/wait_for_nats.sh
          bash tool/ci/wait_for_rabbitmq.sh
          bash tool/ci/wait_for_toxiproxy.sh
          for scenario in nats-tcp-partition rabbitmq-tcp-partition rabbitmq-channel-failures; do
            report="test-results/lifecycle-${scenario}.json"
            timeout --signal=TERM --kill-after=5s 2m \
              build/podbus-fault-suite \
                --profile=smoke \
                --scenario="$scenario" \
                --report="$report"
            python3 - "$report" "$scenario" <<'PY'
          import json
          import pathlib
          import sys

          data = json.loads(pathlib.Path(sys.argv[1]).read_text())
          scenario = sys.argv[2]
          assert data['success'] is True, data
          assert len(data['results']) == 1, data
          assert data['results'][0]['name'] == scenario, data
          assert data['results'][0]['success'] is True, data
          print(f"validated {scenario}: {data['results'][0]['durationMs']} ms")
          PY
          done
      - name: Stop brokers
        if: always()
        run: docker compose -f docker-compose.integration.yaml down -v --remove-orphans
      - name: Publish source-only fix
        shell: bash
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git rm \
            tool/ci/apply_recovery_task_drain.py \
            tool/ci/capture_aot_fault_handles.sh
          git add \
            packages/podbus_core/lib/src/resilience.dart \
            tool/src/fault_harness.dart
          git commit -m "Close fault harness resources deterministically"
          git push origin HEAD:automation/recovery-task-drain
