name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  DART_SDK: 3.12.0

jobs:
  quality:
    name: Format and analyze
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: dart-lang/setup-dart@v1
        with:
          sdk: ${{ env.DART_SDK }}
      - name: Resolve dependencies
        run: dart pub get
      - name: Check formatting
        run: dart format --output=none --set-exit-if-changed .
      - name: Analyze
        run: dart analyze .
      - name: Verify package metadata
        run: dart run tool/verify_release.dart --check

  unit-tests:
    name: Unit tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: dart-lang/setup-dart@v1
        with:
          sdk: ${{ env.DART_SDK }}
      - name: Resolve dependencies
        run: dart pub get
      - name: Create result directories
        run: mkdir -p test-results coverage
      - name: Run unit tests
        run: >-
          dart test
          packages/podbus_core/test
          packages/podbus_nats/test
          packages/podbus_rabbitmq/test
          packages/podbus_kafka/test
          packages/podbus_serverpod/test
          --exclude-tags=integration
          --coverage=coverage
          --file-reporter=json:test-results/unit.json
      - name: Upload unit-test diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: unit-test-diagnostics
          path: |
            test-results/unit.json
            coverage
          if-no-files-found: warn
          retention-days: 14

  nats-integration:
    name: NATS integration
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: dart-lang/setup-dart@v1
        with:
          sdk: ${{ env.DART_SDK }}
      - name: Resolve dependencies
        run: dart pub get
      - name: Start NATS
        run: docker compose -f docker-compose.integration.yaml up -d nats
      - name: Wait for NATS readiness
        run: bash tool/ci/wait_for_nats.sh
      - name: Run NATS integration tests
        env:
          PODBUS_RUN_INTEGRATION_TESTS: "true"
        run: >-
          dart test
          packages/podbus_nats/test/nats_core_integration_test.dart
          packages/podbus_nats/test/nats_jetstream_integration_test.dart
          --tags=integration
          --reporter=expanded
          --file-reporter=json:test-results-nats.json
      - name: Capture NATS logs
        if: always()
        run: docker compose -f docker-compose.integration.yaml logs --no-color nats > nats.log
      - name: Upload NATS diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: nats-integration-diagnostics
          path: |
            test-results-nats.json
            nats.log
          if-no-files-found: warn
          retention-days: 14
      - name: Stop NATS
        if: always()
        run: docker compose -f docker-compose.integration.yaml down -v

  rabbitmq-integration:
    name: RabbitMQ integration
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: dart-lang/setup-dart@v1
        with:
          sdk: ${{ env.DART_SDK }}
      - name: Resolve dependencies
        run: dart pub get
      - name: Start RabbitMQ
        run: docker compose -f docker-compose.integration.yaml up -d rabbitmq
      - name: Wait for RabbitMQ readiness
        run: bash tool/ci/wait_for_rabbitmq.sh
      - name: Run RabbitMQ integration tests
        env:
          PODBUS_RUN_INTEGRATION_TESTS: "true"
        run: >-
          dart test
          packages/podbus_rabbitmq/test/rabbitmq_integration_test.dart
          --tags=integration
          --reporter=expanded
          --file-reporter=json:test-results-rabbitmq.json
      - name: Capture RabbitMQ logs
        if: always()
        run: docker compose -f docker-compose.integration.yaml logs --no-color rabbitmq > rabbitmq.log
      - name: Upload RabbitMQ diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: rabbitmq-integration-diagnostics
          path: |
            test-results-rabbitmq.json
            rabbitmq.log
          if-no-files-found: warn
          retention-days: 14
      - name: Stop RabbitMQ
        if: always()
        run: docker compose -f docker-compose.integration.yaml down -v

  kafka-integration:
    name: Kafka integration
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: dart-lang/setup-dart@v1
        with:
          sdk: ${{ env.DART_SDK }}
      - name: Install librdkafka
        run: sudo apt-get update && sudo apt-get install -y librdkafka-dev
      - name: Resolve dependencies
        run: dart pub get
      - name: Start Kafka
        run: docker compose -f docker-compose.integration.yaml up -d kafka
      - name: Wait for Kafka readiness
        run: bash tool/ci/wait_for_kafka.sh
      - name: Run Kafka integration tests
        env:
          PODBUS_RUN_INTEGRATION_TESTS: "true"
        run: >-
          dart test
          packages/podbus_kafka/test/kafka_integration_test.dart
          --tags=integration
          --reporter=expanded
          --file-reporter=json:test-results-kafka.json
      - name: Capture Kafka logs
        if: always()
        run: docker compose -f docker-compose.integration.yaml logs --no-color kafka > kafka.log
      - name: Upload Kafka diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: kafka-integration-diagnostics
          path: |
            test-results-kafka.json
            kafka.log
          if-no-files-found: warn
          retention-days: 14
      - name: Stop Kafka
        if: always()
        run: docker compose -f docker-compose.integration.yaml down -v
