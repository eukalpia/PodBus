name: CI

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: recovery-task-drain-${{ github.ref }}
  cancel-in-progress: true

env:
  DART_SDK: 3.12.0

jobs:
  publish-lifecycle-fix:
    name: Publish validated lifecycle fixes
    if: github.event_name == 'pull_request' && github.head_ref == 'trigger/recovery-task-drain-v3'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: automation/recovery-task-drain
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}
      - uses: dart-lang/setup-dart@65eb853c7ba17dde3be364c3d2858773e7144260
        with:
          sdk: ${{ env.DART_SDK }}
      - name: Apply and validate final lifecycle patch
        run: |
          python3 tool/ci/apply_recovery_task_drain.py
          dart format \
            packages/podbus_core/lib/src/resilience.dart \
            packages/podbus_rabbitmq/lib/src/rabbitmq_adapter.dart \
            tool/src/fault_harness.dart \
            tool/fault_suite.dart
          dart pub get
          dart analyze .
          dart test packages/podbus_core/test/resilience_test.dart
          dart test packages/podbus_rabbitmq/test/rabbitmq_adapter_test.dart
      - name: Commit source-only lifecycle fixes
        shell: bash
        run: |
          set -euo pipefail
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git rm \
            tool/ci/apply_recovery_task_drain.py \
            tool/ci/capture_aot_fault_handles.sh
          git add \
            packages/podbus_core/lib/src/resilience.dart \
            packages/podbus_rabbitmq/lib/src/rabbitmq_adapter.dart \
            tool/src/fault_harness.dart \
            tool/fault_suite.dart
          git commit -m "Close fault harness resources deterministically"
          git push origin HEAD:automation/recovery-task-drain
