name: CI

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: recovery-task-drain-${{ github.ref }}
  cancel-in-progress: true

env:
  DART_SDK: 3.12.0

jobs:
  recovery-task-drain:
    name: Recovery task drain validation
    runs-on: ubuntu-latest
    timeout-minutes: 35
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: automation/recovery-task-drain
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}
      - uses: dart-lang/setup-dart@65eb853c7ba17dde3be364c3d2858773e7144260
        with:
          sdk: ${{ env.DART_SDK }}
      - name: Patch resilient shutdown task draining
        shell: bash
        run: |
          python3 - <<'PY'
          from pathlib import Path

          path = Path('packages/podbus_core/lib/src/resilience.dart')
          source = path.read_text()

          marker = '''    _stopHealthMonitor();

    final registrations = _registrations.toList();'''
          replacement = '''    _stopHealthMonitor();

    final connecting = _connecting;
    final recovery = _recovery;
    _connecting = null;
    _recovery = null;
    final registrations = _registrations.toList();'''
          if source.count(marker) != 2:
              raise SystemExit(f'expected 2 close markers, found {source.count(marker)}')
          source = source.replace(marker, replacement)

          message_old = '''    try {
      // Registration shutdown and transport shutdown intentionally run together.
      // A worker can be blocked in a broker fetch while the transport close is
      // the operation that releases that fetch. Serial shutdown deadlocks that
      // dependency and can skip adapter cleanup after a timeout.
      await Future.wait([
        if (delegate != null)
          guard('delegate', () => delegate.close(timeout: effectiveTimeout)),
        for (final registration in registrations)
          guard(
            'subscription registration',
            () => registration.close(remove: false),
          ),
      ]);
    } finally {
      _closing = false;
    }
'''
          message_new = '''    await Future.wait([
      if (delegate != null)
        guard('delegate', () => delegate.close(timeout: effectiveTimeout)),
      for (final registration in registrations)
        guard(
          'subscription registration',
          () => registration.close(remove: false),
        ),
      if (connecting != null)
        guard('connecting task', () async {
          try {
            await connecting;
          } on Object {
            // Shutdown invalidates an in-flight connection attempt.
          }
        }),
      if (recovery != null)
        guard('recovery task', () async {
          try {
            await recovery;
          } on Object {
            // Shutdown invalidates an in-flight recovery attempt.
          }
        }),
    ]);

    final lateDelegate = _delegate;
    _delegate = null;
    if (lateDelegate != null && !identical(lateDelegate, delegate)) {
      await guard(
        'late delegate',
        () => lateDelegate.close(timeout: effectiveTimeout),
      );
    }
'''
          if message_old not in source:
              raise SystemExit('message bus close block not found')
          source = source.replace(message_old, message_new, 1)

          durable_old = '''    try {
      // Close proxy workers and their owning transport concurrently. Broker
      // fetches can only unblock after the adapter closes its socket/channel.
      await Future.wait([
        if (delegate != null)
          guard('delegate', () => delegate.close(timeout: effectiveTimeout)),
        for (final registration in registrations)
          guard('worker registration', () => registration.close(remove: false)),
      ]);
    } finally {
      _closing = false;
    }
'''
          durable_new = '''    await Future.wait([
      if (delegate != null)
        guard('delegate', () => delegate.close(timeout: effectiveTimeout)),
      for (final registration in registrations)
        guard('worker registration', () => registration.close(remove: false)),
      if (connecting != null)
        guard('connecting task', () async {
          try {
            await connecting;
          } on Object {
            // Shutdown invalidates an in-flight connection attempt.
          }
        }),
      if (recovery != null)
        guard('recovery task', () async {
          try {
            await recovery;
          } on Object {
            // Shutdown invalidates an in-flight recovery attempt.
          }
        }),
    ]);

    final lateDelegate = _delegate;
    _delegate = null;
    if (lateDelegate != null && !identical(lateDelegate, delegate)) {
      await guard(
        'late delegate',
        () => lateDelegate.close(timeout: effectiveTimeout),
      );
    }
'''
          if durable_old not in source:
              raise SystemExit('durable queue close block not found')
          source = source.replace(durable_old, durable_new, 1)

          retry_marker = '''            lastError = error;
            lastStackTrace = stackTrace;
            _lastRecoveryError = error;'''
          retry_replacement = '''            if (_closing || generation != _generation) {
              Error.throwWithStackTrace(error, stackTrace);
            }
            lastError = error;
            lastStackTrace = stackTrace;
            _lastRecoveryError = error;'''
          if source.count(retry_marker) != 2:
              raise SystemExit(
                  f'expected 2 recovery catch markers, found {source.count(retry_marker)}'
              )
          source = source.replace(retry_marker, retry_replacement)
          path.write_text(source)
          PY
          dart format packages/podbus_core/lib/src/resilience.dart
      - name: Validate source
        run: |
          dart pub get
          dart analyze .
          dart test packages/podbus_core/test/resilience_test.dart
      - name: Validate real broker fault process exit
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p build test-results
          dart compile exe tool/fault_suite.dart -o build/podbus-fault-suite
          bash tool/ci/start_integration_services.sh nats rabbitmq toxiproxy
          bash tool/ci/wait_for_nats.sh
          bash tool/ci/wait_for_rabbitmq.sh
          bash tool/ci/wait_for_toxiproxy.sh
          for scenario in nats-tcp-partition rabbitmq-tcp-partition rabbitmq-channel-failures; do
            report="test-results/recovery-drain-${scenario}.json"
            timeout --signal=TERM --kill-after=5s 2m \
              build/podbus-fault-suite \
                --profile=smoke \
                --scenario="$scenario" \
                --report="$report"
            python3 - "$report" "$scenario" <<'PY'
          import json
          import pathlib
          import sys
          data = json.loads(pathlib.Path(sys.argv[1]).read_text())
          scenario = sys.argv[2]
          assert data['success'] is True, data
          assert len(data['results']) == 1, data
          assert data['results'][0]['name'] == scenario, data
          assert data['results'][0]['success'] is True, data
          PY
          done
      - name: Stop brokers
        if: always()
        run: docker compose -f docker-compose.integration.yaml down -v --remove-orphans
      - name: Publish source-only fix
        shell: bash
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add packages/podbus_core/lib/src/resilience.dart
          git commit -m "Drain in-flight recovery tasks during shutdown"
          git push origin HEAD:automation/recovery-task-drain
