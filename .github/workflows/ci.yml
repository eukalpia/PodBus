name: Apply broker fault hardening

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: apply-broker-fault-hardening
  cancel-in-progress: false

env:
  DART_SDK: 3.12.0

jobs:
  apply-and-validate:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: beta-resilience-nats-rabbitmq
          fetch-depth: 0

      - uses: dart-lang/setup-dart@65eb853c7ba17dde3be364c3d2858773e7144260
        with:
          sdk: ${{ env.DART_SDK }}

      - name: Reconstruct and apply validated patch
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY'
          import base64
          import json
          import os
          import urllib.request

          repository = os.environ['GITHUB_REPOSITORY']
          token = os.environ['GH_TOKEN']
          chunks = [
              'ca67c7ebdbcbb4a9a6e9cd0c8743216f3429cb6c',
              '82a095dd0327ed232aca8dd0e8581db1f6d9ffa1',
              '46d9490a191805e1db6adf09abc46e68c9a9790e',
              '1f5043a7311f1c724c8f7a8e9777954dbcc38e4c',
              '08a338d70e95262a04e394ec781d2900ae64f652',
              '8640d0fbb8c3ae82ede95d67779032ae9399f581',
              '08c65555b3ce41850ae06910c1e2ab1f843e2aa3',
              'fbef42873ae56426391fd1574075cc37dafe8998',
          ]
          with open('/tmp/podbus-fault.patch.gz', 'wb') as output:
              for sha in chunks:
                  request = urllib.request.Request(
                      f'https://api.github.com/repos/{repository}/git/blobs/{sha}',
                      headers={
                          'Authorization': f'Bearer {token}',
                          'Accept': 'application/vnd.github+json',
                          'X-GitHub-Api-Version': '2022-11-28',
                      },
                  )
                  with urllib.request.urlopen(request, timeout=30) as response:
                      payload = json.load(response)
                  output.write(base64.b64decode(payload['content']))
          PY
          gzip --test /tmp/podbus-fault.patch.gz
          gzip --decompress --stdout /tmp/podbus-fault.patch.gz > /tmp/podbus-fault.patch
          git apply --check /tmp/podbus-fault.patch
          git apply /tmp/podbus-fault.patch
          git rm -f .github/patches/fault-production.part* || true
          git rm -f .github/patches/resilience-production.patch.gz.b64 || true
          git rm -f .github/workflows/apply-resilience-production.yml || true
          git rm -f .github/workflows/apply-pr10-resilience.yml || true
          git rm -f .github/workflows/export-pr-source.yml || true
          git checkout origin/main -- .github/workflows/ci.yml

      - name: Resolve dependencies
        run: dart pub get

      - name: Validate source and unit suite
        run: |
          dart format .
          git diff --check
          dart analyze .
          dart run tool/verify_release.dart --check
          dart test packages/podbus_core/test packages/podbus_nats/test packages/podbus_rabbitmq/test packages/podbus_kafka/test packages/podbus_postgres/test packages/podbus_observability/test packages/podbus_serverpod/test --exclude-tags=integration --reporter=expanded

      - name: Commit implementation
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Add broker fault injection and soak production gates"
          git push origin HEAD:beta-resilience-nats-rabbitmq
