name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  DART_SDK: 3.12.0

jobs:
  quality:
    name: Format and analyze
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: dart-lang/setup-dart@65eb853c7ba17dde3be364c3d2858773e7144260 # v1.7.2
        with:
          sdk: ${{ env.DART_SDK }}
      - name: Resolve dependencies
        run: dart pub get
      - name: Format sources
        run: dart format .
      - name: Detect formatting drift
        id: formatting
        continue-on-error: true
        run: |
          git diff --exit-code || {
            git diff --binary > formatting.patch
            exit 1
          }
      - name: Analyze
        run: dart analyze .
      - name: Verify package metadata
        run: dart run tool/verify_release.dart --check
      - name: Upload formatting patch
        if: steps.formatting.outcome == 'failure'
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: formatting-patch
          path: formatting.patch
          if-no-files-found: error
          retention-days: 7
      - name: Reject formatting drift
        if: steps.formatting.outcome == 'failure'
        run: exit 1

  unit-tests:
    name: Unit tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: dart-lang/setup-dart@65eb853c7ba17dde3be364c3d2858773e7144260 # v1.7.2
        with:
          sdk: ${{ env.DART_SDK }}
      - name: Resolve dependencies
        run: dart pub get
      - name: Create result directories
        run: mkdir -p test-results coverage
      - name: Run unit tests
        run: >-
          dart test
          packages/podbus_core/test
          packages/podbus_nats/test
          packages/podbus_rabbitmq/test
          packages/podbus_kafka/test
          packages/podbus_postgres/test
          packages/podbus_observability/test
          packages/podbus_serverpod/test
          --exclude-tags=integration
          --coverage=coverage
          --file-reporter=json:test-results/unit.json
      - name: Upload unit-test diagnostics
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: unit-test-diagnostics
          path: |
            test-results/unit.json
            coverage
          if-no-files-found: warn
          retention-days: 14

  nats-integration:
    name: NATS integration
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: dart-lang/setup-dart@65eb853c7ba17dde3be364c3d2858773e7144260 # v1.7.2
        with:
          sdk: ${{ env.DART_SDK }}
      - name: Resolve dependencies
        run: dart pub get
      - name: Start NATS
        run: docker compose -f docker-compose.integration.yaml up -d nats
      - name: Wait for NATS readiness
        run: bash tool/ci/wait_for_nats.sh
      - name: Run NATS integration tests
        env:
          PODBUS_RUN_INTEGRATION_TESTS: "true"
        run: >-
          dart test
          packages/podbus_nats/test/nats_core_integration_test.dart
          packages/podbus_nats/test/nats_jetstream_integration_test.dart
          --tags=integration
          --reporter=expanded
          --file-reporter=json:test-results-nats.json
      - name: Capture NATS logs
        if: always()
        run: docker compose -f docker-compose.integration.yaml logs --no-color nats > nats.log
      - name: Upload NATS diagnostics
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: nats-integration-diagnostics
          path: |
            test-results-nats.json
            nats.log
          if-no-files-found: warn
          retention-days: 14
      - name: Stop NATS
        if: always()
        run: docker compose -f docker-compose.integration.yaml down -v

  rabbitmq-integration:
    name: RabbitMQ integration
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: dart-lang/setup-dart@65eb853c7ba17dde3be364c3d2858773e7144260 # v1.7.2
        with:
          sdk: ${{ env.DART_SDK }}
      - name: Resolve dependencies
        run: dart pub get
      - name: Start RabbitMQ
        run: docker compose -f docker-compose.integration.yaml up -d rabbitmq
      - name: Wait for RabbitMQ readiness
        run: bash tool/ci/wait_for_rabbitmq.sh
      - name: Run RabbitMQ integration tests
        env:
          PODBUS_RUN_INTEGRATION_TESTS: "true"
        run: >-
          dart test
          packages/podbus_rabbitmq/test/rabbitmq_integration_test.dart
          --tags=integration
          --reporter=expanded
          --file-reporter=json:test-results-rabbitmq.json
      - name: Capture RabbitMQ logs
        if: always()
        run: docker compose -f docker-compose.integration.yaml logs --no-color rabbitmq > rabbitmq.log
      - name: Upload RabbitMQ diagnostics
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: rabbitmq-integration-diagnostics
          path: |
            test-results-rabbitmq.json
            rabbitmq.log
          if-no-files-found: warn
          retention-days: 14
      - name: Stop RabbitMQ
        if: always()
        run: docker compose -f docker-compose.integration.yaml down -v

  kafka-integration:
    name: Kafka integration
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: dart-lang/setup-dart@65eb853c7ba17dde3be364c3d2858773e7144260 # v1.7.2
        with:
          sdk: ${{ env.DART_SDK }}
      - name: Install librdkafka
        run: sudo apt-get update && sudo apt-get install -y librdkafka-dev
      - name: Resolve dependencies
        run: dart pub get
      - name: Start Kafka
        run: docker compose -f docker-compose.integration.yaml up -d kafka
      - name: Wait for Kafka readiness and provision topic
        run: bash tool/ci/wait_for_kafka.sh
      - name: Run Kafka integration tests
        env:
          PODBUS_RUN_INTEGRATION_TESTS: "true"
        run: >-
          dart test
          packages/podbus_kafka/test/kafka_integration_test.dart
          --tags=integration
          --reporter=expanded
          --file-reporter=json:test-results-kafka.json
      - name: Capture Kafka logs
        if: always()
        run: docker compose -f docker-compose.integration.yaml logs --no-color kafka > kafka.log
      - name: Upload Kafka diagnostics
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: kafka-integration-diagnostics
          path: |
            test-results-kafka.json
            kafka.log
          if-no-files-found: warn
          retention-days: 14
      - name: Stop Kafka
        if: always()
        run: docker compose -f docker-compose.integration.yaml down -v

  postgres-integration:
    name: PostgreSQL reliability integration
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: dart-lang/setup-dart@65eb853c7ba17dde3be364c3d2858773e7144260 # v1.7.2
        with:
          sdk: ${{ env.DART_SDK }}
      - name: Resolve dependencies
        run: dart pub get
      - name: Start PostgreSQL
        run: docker compose -f docker-compose.integration.yaml up -d postgres
      - name: Wait for PostgreSQL readiness
        run: >-
          docker compose -f docker-compose.integration.yaml exec -T postgres
          sh -c 'until pg_isready -U podbus -d podbus; do sleep 1; done'
      - name: Run PostgreSQL reliability tests
        env:
          PODBUS_RUN_INTEGRATION_TESTS: "true"
        run: >-
          dart test
          packages/podbus_postgres/test/postgres_integration_test.dart
          --tags=integration
          --reporter=expanded
          --file-reporter=json:test-results-postgres.json
      - name: Capture PostgreSQL logs
        if: always()
        run: docker compose -f docker-compose.integration.yaml logs --no-color postgres > postgres.log
      - name: Upload PostgreSQL diagnostics
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: postgres-integration-diagnostics
          path: |
            test-results-postgres.json
            postgres.log
          if-no-files-found: warn
          retention-days: 14
      - name: Stop PostgreSQL
        if: always()
        run: docker compose -f docker-compose.integration.yaml down -v

  production-gate:
    name: Production gate
    if: always()
    needs:
      - quality
      - unit-tests
      - nats-integration
      - rabbitmq-integration
      - kafka-integration
      - postgres-integration
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Verify required checks
        env:
          QUALITY: ${{ needs.quality.result }}
          UNIT: ${{ needs.unit-tests.result }}
          NATS: ${{ needs.nats-integration.result }}
          RABBITMQ: ${{ needs.rabbitmq-integration.result }}
          KAFKA: ${{ needs.kafka-integration.result }}
          POSTGRES: ${{ needs.postgres-integration.result }}
        run: |
          set -euo pipefail
          for result in "$QUALITY" "$UNIT" "$NATS" "$RABBITMQ" "$KAFKA" "$POSTGRES"; do
            test "$result" = success
          done
