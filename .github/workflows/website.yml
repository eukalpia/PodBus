name: Website

on:
  pull_request:
    paths:
      - "website/**"
      - "assets/podbus.png"
      - ".github/workflows/website.yml"
  push:
    branches: [main]
    paths:
      - "website/**"
      - "assets/podbus.png"
      - ".github/workflows/website.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: website-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NEXT_TELEMETRY_DISABLED: "1"

jobs:
  build:
    name: Type-check and build documentation
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: website/package-lock.json

      - name: Prepare public assets
        run: |
          mkdir -p website/public
          cp assets/podbus.png website/public/podbus.png

      - name: Install dependencies
        working-directory: website
        run: npm ci --no-audit --no-fund

      - name: Type-check
        working-directory: website
        run: npm run typecheck

      - name: Build static export
        working-directory: website
        run: GITHUB_ACTIONS=true npm run build

      - name: Validate generated routes
        run: |
          test -s website/out/index.html
          test -s website/out/docs/index.html
          test -s website/out/docs/introduction/index.html
          test -s website/out/docs/delivery-semantics/index.html
          test -s website/out/docs/rabbitmq/index.html
          test -s website/out/docs/beta-qualification/index.html
          test -s website/out/docs/api-reference/index.html

      - name: Upload static export
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: podbus-documentation-export
          path: website/out
          if-no-files-found: warn
          retention-days: 7
