name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  id-token: write
  attestations: write

jobs:
  release:
    name: Verify and publish release artifacts
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment: release
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: dart-lang/setup-dart@v1
        with:
          sdk: 3.12.0
      - name: Resolve dependencies
        run: dart pub get
      - name: Verify source
        run: |
          dart format --output=none --set-exit-if-changed .
          dart analyze .
          dart run tool/verify_release.dart --check
          dart test \
            packages/podbus_core/test \
            packages/podbus_nats/test \
            packages/podbus_rabbitmq/test \
            packages/podbus_kafka/test \
            packages/podbus_serverpod/test \
            --exclude-tags=integration
      - name: Verify tag matches package version
        shell: bash
        run: |
          set -euo pipefail
          version=$(awk '/^version:/{print $2; exit}' packages/podbus_core/pubspec.yaml)
          expected="v${version}"
          if [[ "$GITHUB_REF_NAME" != "$expected" ]]; then
            echo "Tag $GITHUB_REF_NAME does not match package version $expected." >&2
            exit 1
          fi
      - name: Build source archives
        shell: bash
        run: |
          set -euo pipefail
          prefix="PodBus-${GITHUB_REF_NAME}"
          git archive --format=tar.gz --prefix="${prefix}/" -o "${prefix}.tar.gz" HEAD
          git archive --format=zip --prefix="${prefix}/" -o "${prefix}.zip" HEAD
          sha256sum "${prefix}.tar.gz" "${prefix}.zip" > SHA256SUMS
      - name: Generate SBOM
        uses: anchore/sbom-action@v0
        with:
          path: .
          format: spdx-json
          output-file: PodBus-${{ github.ref_name }}.spdx.json
      - name: Attest source archive
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: |
            PodBus-${{ github.ref_name }}.tar.gz
            PodBus-${{ github.ref_name }}.zip
            PodBus-${{ github.ref_name }}.spdx.json
      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          fail_on_unmatched_files: true
          files: |
            PodBus-${{ github.ref_name }}.tar.gz
            PodBus-${{ github.ref_name }}.zip
            PodBus-${{ github.ref_name }}.spdx.json
            SHA256SUMS
