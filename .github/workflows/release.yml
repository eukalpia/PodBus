name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  id-token: write
  attestations: write

jobs:
  source-gate:
    name: Verify release source
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          fetch-depth: 0
      - uses: dart-lang/setup-dart@65eb853c7ba17dde3be364c3d2858773e7144260
        with:
          sdk: 3.12.0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: website/package-lock.json
      - name: Resolve Dart dependencies
        run: dart pub get
      - name: Verify Dart source and release metadata
        run: |
          dart format --output=none --set-exit-if-changed .
          dart analyze .
          dart run tool/verify_release.dart --check --tag="$GITHUB_REF_NAME"
          dart test \
            packages/podbus_core/test \
            packages/podbus_nats/test \
            packages/podbus_rabbitmq/test \
            packages/podbus_kafka/test \
            packages/podbus_postgres/test \
            packages/podbus_observability/test \
            packages/podbus_serverpod/test \
            --exclude-tags=integration
      - name: Build release documentation
        shell: bash
        run: |
          mkdir -p website/public
          cp assets/podbus.png website/public/podbus.png
          cd website
          npm ci --no-audit --no-fund
          npm run typecheck
          GITHUB_ACTIONS=true npm run build
          test -s out/index.html
          test -s out/docs/beta-qualification/index.html

  fault-gate:
    name: release fault / ${{ matrix.scenario }}
    needs: source-gate
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      max-parallel: 3
      matrix:
        scenario:
          - nats-tcp-partition
          - rabbitmq-tcp-partition
          - rabbitmq-channel-failures
          - nats-crash-before-ack
          - rabbitmq-crash-before-ack
          - multiple-replicas
          - nats-broker-stop-before-confirm
          - rabbitmq-broker-stop-before-confirm
          - nats-shutdown-during-dlq-ack
          - rabbitmq-shutdown-during-retry-confirm
          - rabbitmq-shutdown-during-dlq-confirm
          - slow-consumers
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - uses: dart-lang/setup-dart@65eb853c7ba17dde3be364c3d2858773e7144260
        with:
          sdk: 3.12.0
      - name: Resolve dependencies
        run: dart pub get
      - name: Start clean production-gate brokers
        run: bash tool/ci/start_integration_services.sh nats rabbitmq toxiproxy
      - name: Wait for production-gate brokers
        run: |
          bash tool/ci/wait_for_nats.sh
          bash tool/ci/wait_for_rabbitmq.sh
          bash tool/ci/wait_for_toxiproxy.sh
      - name: Run isolated full fault scenario
        run: >-
          timeout --signal=TERM --kill-after=15s 10m
          dart run tool/fault_suite.dart
          --profile=full
          --scenario=${{ matrix.scenario }}
          --report=test-results/release-${{ matrix.scenario }}.json
      - name: Capture production-gate diagnostics
        if: always()
        shell: bash
        run: |
          mkdir -p test-results
          docker compose -f docker-compose.integration.yaml logs --no-color \
            nats rabbitmq-init rabbitmq toxiproxy \
            > test-results/release-fault-brokers.log 2>&1 || true
          bash tool/ci/capture_rabbitmq_state.sh || true
      - name: Upload production-gate diagnostics
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: release-fault-${{ matrix.scenario }}
          path: test-results
          if-no-files-found: warn
          retention-days: 90
      - name: Stop production-gate brokers
        if: always()
        run: docker compose -f docker-compose.integration.yaml down -v --remove-orphans

  release:
    name: Publish verified release artifacts
    needs:
      - source-gate
      - fault-gate
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment: release
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          fetch-depth: 0
      - uses: dart-lang/setup-dart@65eb853c7ba17dde3be364c3d2858773e7144260
        with:
          sdk: 3.12.0
      - name: Resolve dependencies
        run: dart pub get
      - name: Verify release metadata again
        run: dart run tool/verify_release.dart --check --tag="$GITHUB_REF_NAME"
      - name: Build source archives
        shell: bash
        run: |
          set -euo pipefail
          prefix="PodBus-${GITHUB_REF_NAME}"
          git archive --format=tar.gz --prefix="${prefix}/" -o "${prefix}.tar.gz" HEAD
          git archive --format=zip --prefix="${prefix}/" -o "${prefix}.zip" HEAD
          sha256sum "${prefix}.tar.gz" "${prefix}.zip" > SHA256SUMS
      - name: Generate SPDX SBOM
        run: >-
          dart run tool/generate_sbom.dart
          --name PodBus-${{ github.ref_name }}
          --output PodBus-${{ github.ref_name }}.spdx.json
      - name: Attest release artifacts
        uses: actions/attest-build-provenance@e8998f949152b193b063cb0ec769d69d929409be
        with:
          subject-path: |
            PodBus-${{ github.ref_name }}.tar.gz
            PodBus-${{ github.ref_name }}.zip
            PodBus-${{ github.ref_name }}.spdx.json
      - name: Create GitHub release
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65
        with:
          generate_release_notes: true
          fail_on_unmatched_files: true
          files: |
            PodBus-${{ github.ref_name }}.tar.gz
            PodBus-${{ github.ref_name }}.zip
            PodBus-${{ github.ref_name }}.spdx.json
            SHA256SUMS
