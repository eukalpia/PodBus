name: Analyzer diagnostics

on:
  pull_request:

permissions:
  contents: read

jobs:
  analyze:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: dart-lang/setup-dart@65eb853c7ba17dde3be364c3d2858773e7144260 # v1.7.2
        with:
          sdk: 3.12.0
      - run: dart pub get
      - name: Analyze
        id: analyze
        continue-on-error: true
        shell: bash
        run: |
          set -o pipefail
          dart analyze . 2>&1 | tee analyzer.log
      - name: Upload analyzer output
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: analyzer-diagnostics
          path: analyzer.log
          if-no-files-found: error
          retention-days: 7
      - name: Reject analyzer issues
        if: steps.analyze.outcome == 'failure'
        run: exit 1
