name: Export PR source

on:
  pull_request:
    paths:
      - ".github/workflows/export-pr-source.yml"
  push:
    branches: [beta-resilience-nats-rabbitmq]
    paths:
      - ".github/workflows/export-pr-source.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  export:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          persist-credentials: false
      - uses: dart-lang/setup-dart@65eb853c7ba17dde3be364c3d2858773e7144260
        with:
          sdk: 3.12.0
      - name: Resolve dependencies
        run: dart pub get
      - name: Archive source, dependencies, and SDK
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p /tmp/podbus-export/repository
          tar --exclude=.git --exclude=.dart_tool -czf /tmp/podbus-export/repository/podbus-source.tar.gz .
          tar -C "$PUB_CACHE" -czf /tmp/podbus-pub-cache.tar.gz hosted
          tar -C /tmp/podbus-export -czf /tmp/podbus-pr-source.tar.gz .
          DART_BIN="$(readlink -f "$(command -v dart)")"
          DART_SDK_DIR="$(dirname "$(dirname "$DART_BIN")")"
          tar -C "$(dirname "$DART_SDK_DIR")" -czf /tmp/dart-sdk.tar.gz "$(basename "$DART_SDK_DIR")"
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: podbus-pr-source
          path: /tmp/podbus-pr-source.tar.gz
          retention-days: 1
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: podbus-pub-cache
          path: /tmp/podbus-pub-cache.tar.gz
          retention-days: 1
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: dart-sdk-linux-x64
          path: /tmp/dart-sdk.tar.gz
          retention-days: 1
