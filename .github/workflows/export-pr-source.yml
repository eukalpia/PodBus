name: Export PR source

on:
  push:
    branches: [beta-resilience-nats-rabbitmq]
    paths:
      - ".github/workflows/export-pr-source.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  export:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          persist-credentials: false
      - name: Archive source
        run: tar --exclude=.git -czf /tmp/podbus-source.tar.gz .
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: podbus-pr-source
          path: /tmp/podbus-source.tar.gz
          retention-days: 1
