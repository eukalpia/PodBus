name: Documentation example maintenance

on:
  push:
    branches: [main]
    paths:
      - "website/**"
      - ".github/workflows/docs-example-maintenance.yml"

permissions:
  contents: write

concurrency:
  group: docs-example-maintenance
  cancel-in-progress: true

env:
  NEXT_TELEMETRY_DISABLED: "1"

jobs:
  patch-and-validate:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: main
          fetch-depth: 0

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: website/package-lock.json

      - name: Align examples with public APIs
        run: |
          python3 - <<'PY'
          from pathlib import Path

          def replace(path: str, old: str, new: str) -> None:
              file = Path(path)
              text = file.read_text()
              if old not in text:
                  raise SystemExit(f'Expected fragment not found in {path}: {old[:100]!r}')
              file.write_text(text.replace(old, new))

          replace(
              'README.md',
              """  deadLetterPolicy: const DeadLetterPolicy(\n    destination: 'jobs.email.welcome.dead',""",
              """  deadLetterPolicy: const DeadLetterPolicy(\n    enabled: true,\n    destination: 'jobs.email.welcome.dead',""",
          )

          replace(
              'website/content/core-concepts.ts',
              """  retryPolicy: RetryPolicy(maxAttempts: 7),\n  deadLetterPolicy: const DeadLetterPolicy(\n    destination: 'jobs.invoice.generate.dead',""",
              """  retryPolicy: RetryPolicy(\n    maxAttempts: 7,\n    initialDelay: const Duration(milliseconds: 250),\n    maxDelay: const Duration(seconds: 30),\n    jitter: 0.2,\n  ),\n  deadLetterPolicy: const DeadLetterPolicy(\n    enabled: true,\n    destination: 'jobs.invoice.generate.dead',""",
          )
          replace(
              'website/content/core-concepts.ts',
              '  multiplier: 2,',
              '  backoffMultiplier: 2,',
          )

          replace(
              'website/content/transports.ts',
              """  deadLetterPolicy: const DeadLetterPolicy(\n    destination: 'jobs.report.generate.dead',""",
              """  deadLetterPolicy: const DeadLetterPolicy(\n    enabled: true,\n    destination: 'jobs.report.generate.dead',""",
          )
          replace(
              'website/content/transports.ts',
              "'Use TLS and NKey, JWT, credentials, or scoped user authentication in production.',",
              "'Use TLS with a scoped token or username/password credentials. NKey and JWT authentication are not exposed by the current adapter.',",
          )
          replace(
              'website/content/transports.ts',
              "text: 'The stream name and subject set are persistent broker state. Keep their definitions in version control and review retention, storage, replica count, maximum age, maximum bytes, and discard policy with the same care as a database schema.',",
              "text: 'The stream name and subject set are persistent broker state. Keep their definitions in version control and review retention, storage, replica count, maximum age, maximum bytes, and discard policy with the same care as a database schema. The alpha adapter exposes stream retention and replica options, but advanced consumer tuning remains a production validation item.',",
          )
          replace(
              'website/content/transports.ts',
              "title: 'Consumer tuning',",
              "title: 'Consumer settings to validate',",
          )
          replace(
              'website/content/transports.ts',
              "text: 'When handlers regularly exceed the acknowledgement window, the same message may run concurrently on another worker. Use in-progress heartbeats or redesign the job into smaller steps.',",
              "text: 'When handlers regularly exceed the acknowledgement window, the same message may run concurrently on another worker. The current alpha API does not expose every JetStream consumer knob; validate broker defaults and redesign long jobs into smaller steps where necessary.',",
          )

          replace(
              'website/content/reliability.ts',
              """handler: (context, event) async {\n  final messageId = context.headers.messageId;\n  final lease = await inbox.acquire(\n    messageId,""",
              """handler: (context, event) async {\n  // Use a stable ID carried by the domain event or wire envelope.\n  final deliveryKey = event.eventId;\n  final lease = await inbox.acquire(\n    deliveryKey,""",
          )
          replace(
              'website/content/reliability.ts',
              '    await inbox.fail(lease, error: error);',
              '    await inbox.fail(lease, error);',
          )
          replace(
              'website/content/reliability.ts',
              "title: 'Recommended state machine',",
              "title: 'A richer business-operation state model',",
          )
          replace(
              'website/content/reliability.ts',
              "text: 'A lease is safer than a permanent processing flag. If a worker dies, another worker can recover the operation after the lease expires.',",
              "text: 'PostgresIdempotencyStore currently provides a compact TTL claim rather than this full state machine. Use PostgresInbox for leased processing state, or build a domain-specific operation table when pending, processing, completed, and terminal failure states must be distinguished.',",
          )

          replace(
              'website/content/getting-started.ts',
              """final messagingConfig = MessagingConfig(\n  codecRegistry: codecs,\n  maxPayloadBytes: 1024 * 1024,\n  maxHeaderBytes: 16 * 1024,\n  requestTimeout: const Duration(seconds: 5),""",
              """final messagingConfig = MessagingConfig(\n  codecRegistry: codecs,\n  limits: const MessagingLimits(\n    maxPayloadBytes: 1024 * 1024,\n    maxHeaderBytes: 16 * 1024,\n  ),\n  requestTimeout: const Duration(seconds: 5),""",
          )

          replace(
              'website/content/reference.ts',
              """              ['messageId', 'Stable identity for one physical message.'],\n              ['correlationId', 'Groups a business flow across messages and services.'],\n              ['causationId', 'Identifies the command or message that caused this message.'],\n              ['traceId', 'Links transport processing to tracing.'],\n              ['idempotencyKey', 'Protects one logical operation from duplicates.'],\n              ['custom', 'Bounded application metadata outside reserved wire keys.'],""",
              """              ['correlationId', 'Groups a business flow across messages and services.'],\n              ['causationId', 'Identifies the command or message that caused this message.'],\n              ['tenantId', 'Carries a bounded tenant identifier when the application needs it.'],\n              ['userId', 'Carries a bounded user identifier when appropriate.'],\n              ['traceId', 'Links transport processing to tracing.'],\n              ['idempotencyKey', 'Protects one logical operation from duplicates.'],\n              ['attempt', 'Tracks the current delivery attempt, starting at one.'],\n              ['custom', 'Bounded application metadata outside reserved wire keys.'],""",
          )
          replace(
              'website/content/reference.ts',
              "['RetryPolicy', 'maxAttempts, initialDelay, maxDelay, multiplier, jitter']",
              "['RetryPolicy', 'maxAttempts, initialDelay, maxDelay, backoffMultiplier, jitter']",
          )
          replace(
              'website/content/reference.ts',
              """              ['maxPayloadBytes', 'Rejects oversized encoded payloads.', 'Start at 1 MiB or less.'],\n              ['maxHeaderBytes', 'Rejects oversized wire metadata.', 'Start at 16 KiB or less.'],""",
              """              ['limits', 'MessagingLimits for payload, header count, header bytes, and error details.', 'Start with 1 MiB payloads and 16 KiB headers or less.'],""",
          )
          replace(
              'website/content/reference.ts',
              "['Authentication', 'token, credentials, NKey, JWT, TLS context']",
              "['Authentication', 'token or username/password, plus the TLS toggle exposed by the current adapter']",
          )

          replace(
              'website/content/operations.ts',
              "['NATS', 'TLS plus scoped credentials, NKey, or JWT accounts.']",
              "['NATS', 'TLS plus a scoped token or username/password credentials exposed by the current adapter.']",
          )
          replace(
              'website/content/operations.ts',
              '  await messaging.close(timeout: const Duration(seconds: 30));',
              '  await messaging.stop(timeout: const Duration(seconds: 30));',
          )

          replace(
              'docs/production.md',
              '- NATS: TLS plus credentials, NKey, or JWT accounts.',
              '- NATS: TLS plus a scoped token or username/password credentials exposed by the current adapter.',
          )
          PY

      - name: Verify corrected examples
        run: |
          ! grep -R "context.headers.messageId" website README.md
          ! grep -R "multiplier: 2" website README.md
          ! grep -R "messaging.close" website README.md
          ! grep -R "NKey, JWT" website docs README.md
          python3 - <<'PY'
          from pathlib import Path
          for path in [Path('README.md'), *Path('website/content').glob('*.ts')]:
              text = path.read_text()
              marker = 'const DeadLetterPolicy('
              start = 0
              while True:
                  index = text.find(marker, start)
                  if index < 0:
                      break
                  block = text[index:index + 180]
                  if 'enabled:' not in block:
                      raise SystemExit(f'Missing enabled in DeadLetterPolicy example: {path}')
                  start = index + len(marker)
          PY

      - name: Build documentation
        working-directory: website
        run: |
          npm ci --no-audit --no-fund
          npm run typecheck
          GITHUB_ACTIONS=true npm run build

      - name: Commit corrections
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git rm .github/workflows/docs-example-maintenance.yml
          git add README.md docs/production.md website/content
          git commit -m "Align documentation examples with PodBus APIs"
          git push origin HEAD:main
