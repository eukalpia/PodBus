name: Apply resilience production hardening

on:
  push:
    branches: [beta-resilience-nats-rabbitmq]
    paths:
      - ".github/workflows/apply-resilience-production.yml"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: apply-resilience-production
  cancel-in-progress: false

env:
  DART_SDK: 3.12.0

jobs:
  apply-and-validate:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: beta-resilience-nats-rabbitmq
          fetch-depth: 0

      - uses: dart-lang/setup-dart@65eb853c7ba17dde3be364c3d2858773e7144260 # v1.7.2
        with:
          sdk: ${{ env.DART_SDK }}

      - name: Apply resilience implementation
        shell: bash
        run: |
          set -euo pipefail
          base64 --decode .github/patches/resilience-production.patch.gz.b64 \
            | gzip --decompress > /tmp/resilience-production.patch
          git apply --check /tmp/resilience-production.patch
          git apply /tmp/resilience-production.patch
          git rm .github/patches/resilience-production.patch.gz.b64
          git rm .github/workflows/apply-resilience-production.yml
          git rm .github/workflows/export-pr-source.yml

      - name: Resolve dependencies
        run: dart pub get

      - name: Format and analyze
        run: |
          dart format .
          git diff --check
          dart analyze .

      - name: Run complete unit suite
        run: >-
          dart test
          packages/podbus_core/test
          packages/podbus_nats/test
          packages/podbus_rabbitmq/test
          packages/podbus_kafka/test
          packages/podbus_postgres/test
          packages/podbus_observability/test
          packages/podbus_serverpod/test
          --exclude-tags=integration
          --reporter=expanded

      - name: Commit validated implementation
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Harden NATS and RabbitMQ fault recovery"
          git push origin HEAD:beta-resilience-nats-rabbitmq
