name: Execute health-probe shutdown fix

on:
  pull_request:
    paths:
      - "tool/qualification/trigger-health-probe-fix.txt"

permissions:
  contents: write

concurrency:
  group: execute-health-probe-shutdown-fix
  cancel-in-progress: true

jobs:
  patch-validate-publish:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: docs/beta-candidate-evidence
          fetch-depth: 0
      - uses: dart-lang/setup-dart@65eb853c7ba17dde3be364c3d2858773e7144260
        with:
          sdk: 3.12.0
      - name: Load and apply patch script from main
        shell: bash
        run: |
          git fetch origin main
          git show origin/main:tool/ci/apply_health_probe_shutdown_fix.py > /tmp/apply_fix.py
          python3 /tmp/apply_fix.py
      - name: Validate regression
        run: |
          dart pub get
          dart format packages/podbus_core/lib/src/resilience.dart packages/podbus_core/test/resilience_test.dart
          dart analyze packages/podbus_core
          dart test packages/podbus_core/test/resilience_test.dart --reporter=expanded
      - name: Publish validated commit
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add packages/podbus_core/lib/src/resilience.dart packages/podbus_core/test/resilience_test.dart
          git commit -m "Prevent late health probes from reconnecting after shutdown"
          git fetch origin automation/health-probe-shutdown-fix
          git rebase origin/automation/health-probe-shutdown-fix
          git push origin HEAD:automation/health-probe-shutdown-fix
