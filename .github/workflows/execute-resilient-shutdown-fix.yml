name: Execute resilient shutdown fix

on:
  pull_request:
    paths:
      - "tool/qualification/trigger-resilient-shutdown-fix.txt"

permissions:
  contents: write

concurrency:
  group: execute-resilient-shutdown-fix
  cancel-in-progress: true

jobs:
  patch-validate-publish:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: docs/beta-candidate-evidence
          fetch-depth: 0
      - uses: dart-lang/setup-dart@65eb853c7ba17dde3be364c3d2858773e7144260
        with:
          sdk: 3.12.0
      - name: Apply resilient shutdown patch from main
        shell: bash
        run: |
          git fetch origin main
          git show origin/main:tool/ci/apply_resilient_shutdown_fix.py \
            > /tmp/apply_resilient_shutdown_fix.py
          python3 /tmp/apply_resilient_shutdown_fix.py
      - name: Validate source and regressions
        run: |
          dart pub get
          dart format packages/podbus_core/lib/src/resilience.dart \
            packages/podbus_core/test/resilience_test.dart
          dart analyze packages/podbus_core
          dart test packages/podbus_core/test/resilience_test.dart \
            --reporter=expanded
      - name: Publish source-only fix
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add packages/podbus_core/lib/src/resilience.dart \
            packages/podbus_core/test/resilience_test.dart
          git commit -m "Close resilient proxies and transports concurrently"
          git fetch origin automation/resilient-shutdown-fix
          git rebase origin/automation/resilient-shutdown-fix
          git push origin HEAD:automation/resilient-shutdown-fix
