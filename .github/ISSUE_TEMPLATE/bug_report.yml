name: Bug report
description: Report reproducible incorrect behavior
title: "[Bug]: "
labels: [bug]
body:
  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: Include expected and actual behavior.
    validations:
      required: true
  - type: dropdown
    id: transport
    attributes:
      label: Transport
      options: [Core, NATS Core, NATS JetStream, RabbitMQ, Kafka, Serverpod]
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Minimal reproduction
      render: dart
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: PodBus commit or version
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Dart version, OS, broker version, and deployment topology.
