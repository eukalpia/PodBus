services:
  nats:
    image: nats:2.10
    command: ["-js", "-sd", "/data", "-m", "8222"]
    ports:
      - "4222:4222"
      - "8222:8222"
    volumes:
      - nats-data:/data

  rabbitmq-init:
    image: rabbitmq:3.13.7-management
    user: "0:0"
    entrypoint: ["/bin/sh", "-ec"]
    environment:
      RABBITMQ_ERLANG_COOKIE: "PODBUS_INTEGRATION_COOKIE_2026"
    command: |
      mkdir -p /var/lib/rabbitmq
      find /var/lib/rabbitmq -mindepth 1 -maxdepth 1 -exec rm -rf {} +
      printf '%s' "$${RABBITMQ_ERLANG_COOKIE}" > /var/lib/rabbitmq/.erlang.cookie
      chown -R rabbitmq:rabbitmq /var/lib/rabbitmq
      chmod 700 /var/lib/rabbitmq
      chmod 400 /var/lib/rabbitmq/.erlang.cookie
      echo "Prepared RabbitMQ state:"
      id rabbitmq
      ls -lan /var/lib/rabbitmq
      stat -c '%u:%g %a %n' /var/lib/rabbitmq /var/lib/rabbitmq/.erlang.cookie
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
    restart: "no"

  rabbitmq:
    image: rabbitmq:3.13.7-management
    hostname: rabbitmq
    depends_on:
      rabbitmq-init:
        condition: service_completed_successfully
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
      RABBITMQ_ERLANG_COOKIE: "PODBUS_INTEGRATION_COOKIE_2026"
      RABBITMQ_NODENAME: rabbit@rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 2s
      timeout: 5s
      retries: 60
      start_period: 10s

  toxiproxy:
    image: ghcr.io/shopify/toxiproxy:2.12.0
    command: ["-host", "0.0.0.0"]
    depends_on:
      nats:
        condition: service_started
      rabbitmq:
        condition: service_healthy
    ports:
      - "8474:8474"
      - "14222:14222"
      - "15670:15670"
    healthcheck:
      test: ["CMD", "/toxiproxy-cli", "list"]
      interval: 2s
      timeout: 3s
      retries: 30

  kafka:
    image: apache/kafka:3.9.0
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: false
    healthcheck:
      test:
        - CMD-SHELL
        - /opt/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9092 --list >/dev/null 2>&1
      interval: 3s
      timeout: 5s
      retries: 30

  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: podbus
      POSTGRES_PASSWORD: podbus
      POSTGRES_DB: podbus
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U podbus -d podbus"]
      interval: 2s
      timeout: 3s
      retries: 30

volumes:
  nats-data:
  rabbitmq-data:
