name: podbus_plain_dart_service
description: Framework-neutral PodBus service and smoke probe using only the Dart SDK and NATS JetStream.
version: 0.1.0-dev
publish_to: none

environment:
  sdk: ^3.12.0

resolution: workspace

dependencies:
  podbus_core:
    path: ../../packages/podbus_core
  podbus_nats:
    path: ../../packages/podbus_nats

dev_dependencies:
  lints: ^6.0.0
